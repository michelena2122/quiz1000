<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Participante</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background: url("assets/images/fondo-rayos.jpg") no-repeat center center fixed;
    background-size: cover;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px 15px 30px;
    box-sizing:border-box;
    color:white;
}

.logo-registro{
    display:block;
    width:180px;
    max-width:70%;
    height:auto;
    margin:0 auto 18px auto;
}

.container{
    background:#000;
    padding:40px;
    border-radius:15px;
    width:100%;
    max-width:400px;
    box-shadow:0 0 30px rgba(255,255,255,0.2);
    box-sizing:border-box;
}

h2{
    text-align:center;
    margin-top:0;
    margin-bottom:20px;
}

input, select{
    width:100%;
    padding:10px;
    margin-bottom:12px;
    border:none;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.payBtn{
    background:#00c853;
    color:white;
}

.error{
    color:#ff5252;
    font-size:13px;
    margin-bottom:10px;
}

@media (max-width: 480px){
    .logo-registro{
        width:150px;
        margin-bottom:14px;
    }

    .container{
        padding:25px 18px;
        border-radius:12px;
    }

    h2{
        font-size:22px;
        margin-bottom:16px;
    }

    input, select, button{
        font-size:16px;
    }
}
</style>
</head>

<body class="registro">

<img src="/assets/images/logotipo.png" class="logo-registro">

<div class="container">

<h2>Registro de Participante</h2>

<p id="amountText"></p>

<div class="error" id="errorMsg"></div>

<input type="text" id="nombre" placeholder="Nombre">
<input type="text" id="apellidos" placeholder="Apellidos">
<input type="number" id="edad" placeholder="Edad" min="1">
<input type="text" id="nacionalidad" placeholder="Nacionalidad">

<div style="display:flex; gap:5px;">
    <select id="codigoPais" style="width:35%;">
        <option value="+52">🇲🇽 +52</option>
        <option value="+1">🇺🇸 +1</option>
        <option value="+34">🇪🇸 +34</option>
        <option value="+57">🇨🇴 +57</option>
        <option value="+54">🇦🇷 +54</option>
    </select>

    <input type="tel" id="telefono" placeholder="Teléfono" style="width:65%;">
</div>

<input type="email" id="email" placeholder="Correo electrónico">
<input type="password" id="password" placeholder="Crea una contraseña">

<div style="margin-bottom:15px; font-size:14px;">
    <input type="checkbox" id="aceptaTerminos">
    He leído y acepto los 
    <a href="legales" target="_blank" style="color:#00e676;">
        Términos Legales y Aviso de Privacidad
    </a>
</div>

<button class="payBtn" id="pagarBtn">Continuar al Pago</button>
<div id="googleBtnContainer" style="margin-top:10px;"></div>
<div id="facebookBtnContainer" style="margin-top:10px;"></div>
</div>


<script>
  // ============================
// EVITAR DOBLE REGISTRO
// ============================

const jugadorActual = JSON.parse(localStorage.getItem("jugadorActual"));
const usuarioLogueado = JSON.parse(localStorage.getItem("usuarioLogueado"));

const usuarioActivo = jugadorActual && jugadorActual.id
    ? jugadorActual
    : (usuarioLogueado && usuarioLogueado.id ? usuarioLogueado : null);

if(usuarioActivo){

    console.log("USUARIO YA LOGUEADO, REDIRECCIÓN DIRECTA");

    localStorage.setItem("jugadorActual", JSON.stringify(usuarioActivo));
    localStorage.setItem("usuarioLogueado", JSON.stringify(usuarioActivo));
    localStorage.setItem("jugadorId", usuarioActivo.id);

    const folio =
        new URLSearchParams(window.location.search).get("folio") ||
        localStorage.getItem("folioTableroActual") ||
        "";

    if(folio){
        window.location.href = "pago.html?folio=" + encodeURIComponent(folio);
    }else{
        window.location.href = "portada.html";
    }

}
 console.log("SCRIPT REGISTRO CARGADO");   
// ============================
// OBTENER PARÁMETROS URL
// ============================
if (new URLSearchParams(window.location.search).get("error") === "email_no_coincide") {
    document.getElementById("errorMsg").textContent = 
        "El email de Google/Facebook no coincide con el que escribiste. Usa el mismo correo en ambos.";
}

if (!numero) {
    numero = localStorage.getItem("numeroSeleccionado") || "0";
}

const pagoLink = params.get("pago") || "#";

// Cambiar mensaje superior
document.getElementById("amountText").innerHTML =
    "<strong>Continúa, vas en serio por los 1,000 USD </strong>";

// Cambiar texto del botón
const pagarBtn = document.getElementById("pagarBtn");
pagarBtn.textContent =
    `Tu número es ${numero} — págalo y sigue rumbo a los 1,000 USD`;

const errorMsg = document.getElementById("errorMsg");

// ============================
// BOTÓN REGISTRO
// ============================

pagarBtn.addEventListener("click", async function () {
    console.log("CLICK REGISTRO"); 
    const nombre = document.getElementById("nombre").value.trim();
    const apellidos = document.getElementById("apellidos").value.trim();
    const edad = document.getElementById("edad").value.trim();
    const nacionalidad = document.getElementById("nacionalidad").value.trim();
    const telefono = document.getElementById("telefono").value.trim();
    const codigoPais = document.getElementById("codigoPais").value;
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const aceptaTerminos = document.getElementById("aceptaTerminos").checked;

    if (!aceptaTerminos) {
        errorMsg.textContent = "Debes aceptar los Términos Legales para continuar.";
        return;
    }

    if (!nombre || !apellidos || !edad || !nacionalidad || !telefono || !email || !password) {
        errorMsg.textContent = "Todos los campos son obligatorios.";
        return;
    }

    if (isNaN(edad) || parseInt(edad) <= 0) {
        errorMsg.textContent = "Ingresa una edad válida.";
        return;
    }

    if (parseInt(edad) < 18) {
        errorMsg.textContent = "Debes ser mayor de 18 años para participar.";
        return;
    }

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        errorMsg.textContent = "Correo electrónico inválido.";
        return;
    }

    errorMsg.textContent = "";

    // ============================
    // GUARDAR REGISTRO PENDIENTE
    // ============================

    const jugadorID = "JUG-" + Date.now();

    const folioTablero =
    localStorage.getItem("folioTableroActual") ||
    localStorage.getItem("folioTablero");

    const jugadorData = {
        id: jugadorID,
        nombre,
        apellidos,
        edad,
        nacionalidad,
        telefono: codigoPais + telefono,
        email,
        password,
        folioTablero,
        numeroComprado: numero,
        mejorTiempoGlobal: null
    };

    localStorage.setItem("registroPendiente", JSON.stringify(jugadorData));
    localStorage.setItem("emailRegistro", email);

    try {
        const res = await fetch("/enviar-codigo", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (data.ok) {
            alert("📧 Te enviamos un código de verificación");
            window.location.href = "validar.html";
        } else {
            errorMsg.textContent = data.mensaje || "Error enviando el correo";
        }
    } catch (err) {
        console.error(err);
        errorMsg.textContent = "No se pudo conectar con el servidor.";
    }
});
// ============================
// Función para construir la URL de Google
// ============================
function obtenerOrigenGoogle() {
    const origenGuardado = localStorage.getItem("origenRegistro");

    if (origenGuardado === "home") {
        return "home";
    }

    return "registro";
}
function validarEdadYTerminos() {
    const edad = document.getElementById("edad").value.trim();
    const aceptaTerminos = document.getElementById("aceptaTerminos").checked;
    const errorMsg = document.getElementById("errorMsg");

    if (!aceptaTerminos) {
        errorMsg.textContent = "Debes aceptar los Términos Legales para continuar.";
        return false;
    }

    if (!edad || isNaN(edad) || parseInt(edad) < 18) {
        errorMsg.textContent = "Debes ser mayor de 18 años para participar.";
        return false;
    }

    errorMsg.textContent = "";
    return true;
}
function construirUrlGoogle() {
    const params = new URLSearchParams(window.location.search);

    const folio =
        params.get("folio") ||
        localStorage.getItem("folioTableroActual") ||
        localStorage.getItem("folioTablero") ||
        "";

    const numeroActual =
        params.get("numero") ||
        localStorage.getItem("numeroSeleccionado") ||
        "0";

    const origen = obtenerOrigenGoogle();
    localStorage.removeItem("origenRegistro");

    const emailCapturado = document.getElementById("email").value.trim().toLowerCase();
    localStorage.setItem("emailOAuthEsperado", emailCapturado);

    return `/auth/google?origen=${encodeURIComponent(origen)}&folio=${encodeURIComponent(folio)}&numero=${encodeURIComponent(numeroActual)}&email=${encodeURIComponent(emailCapturado)}`;
}

// ============================
// Función para construir la URL de Facebook
// ============================
function construirUrlFacebook() {
    const params = new URLSearchParams(window.location.search);

    const folio =
        params.get("folio") ||
        localStorage.getItem("folioTableroActual") ||
        localStorage.getItem("folioTablero") ||
        "";

    const numeroActual =
        params.get("numero") ||
        localStorage.getItem("numeroSeleccionado") ||
        "0";

    const origenGuardado = localStorage.getItem("origenRegistro");
    const origen = (origenGuardado === "home" && !folio) ? "home" : "registro";
    localStorage.removeItem("origenRegistro");

    const emailCapturado = document.getElementById("email").value.trim().toLowerCase();
    localStorage.setItem("emailOAuthEsperado", emailCapturado);

    return `/auth/facebook?origen=${encodeURIComponent(origen)}&folio=${encodeURIComponent(folio)}&numero=${encodeURIComponent(numeroActual)}&email=${encodeURIComponent(emailCapturado)}`;
}

// ============================
// Función para renderizar el botón de Google
// ============================
function renderGoogleButton() {
    const url = construirUrlGoogle();

    const container = document.getElementById("googleBtnContainer");
    if (!container) return;

    container.innerHTML = ""; // Limpiar cualquier contenido previo

    const button = document.createElement("button");
    button.type = "button";
    button.innerHTML = `
        <img src="https://developers.google.com/identity/images/g-logo.png"
             alt="Google"
             style="width:20px; height:20px; margin-right:10px;">
        <span>Continuar con Google</span>
    `;

    button.style.display = "flex";
    button.style.alignItems = "center";
    button.style.justifyContent = "center";
    button.style.width = "100%";
    button.style.padding = "10px";
    button.style.borderRadius = "6px";
    button.style.border = "1px solid #dadce0";
    button.style.background = "#ffffff";
    button.style.color = "#000";
    button.style.fontWeight = "bold";
    button.style.cursor = "pointer";

    button.onclick = function () {
    if (!validarEdadYTerminos()) return;
    window.location.href = construirUrlGoogle();
};
    container.appendChild(button);
}

// ============================
// Función para renderizar el botón de Facebook
// ============================
function renderFacebookButton() {
    const url = construirUrlFacebook();

    const container = document.getElementById("facebookBtnContainer");
    if (!container) return;

    container.innerHTML = ""; // Limpiar cualquier contenido previo

    const button = document.createElement("button");
    button.type = "button";
    button.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="width:20px;height:20px;margin-right:10px;fill:#ffffff;">
            <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.235 2.686.235v2.97h-1.514c-1.491 0-1.956.93-1.956 1.886v2.273h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
        </svg>
        <span>Continuar con Facebook</span>
    `;

    button.style.display = "flex";
    button.style.alignItems = "center";
    button.style.justifyContent = "center";
    button.style.width = "100%";
    button.style.padding = "10px";
    button.style.borderRadius = "6px";
    button.style.border = "none";
    button.style.background = "#1877F2";
    button.style.color = "#ffffff";
    button.style.fontWeight = "bold";
    button.style.cursor = "pointer";

    button.onclick = function () {
    if (!validarEdadYTerminos()) return;
    window.location.href = construirUrlFacebook();
};

    container.appendChild(button);
}

// Llamamos a la función cuando el DOM se haya cargado
document.addEventListener("DOMContentLoaded", function() {
    renderGoogleButton();
    renderFacebookButton();
});

</script>

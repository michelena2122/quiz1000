<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Validar código</title>

<style>

body{
font-family:Arial, sans-serif;
background:url("assets/images/fondo-rayos.jpg") no-repeat center center fixed;
background-size:cover;
margin:0;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding:20px 15px 110px;
box-sizing:border-box;
}

/* LOGO */
.logo{
width:180px;
max-width:70%;
margin-top:20px;
margin-bottom:20px;
display:block;
}

/* CAJA */
.box{
background:rgba(0,0,0,0.85);
color:white;
padding:28px 20px;
border-radius:12px;
text-align:center;
width:100%;
max-width:350px;
box-sizing:border-box;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
border-radius:6px;
border:none;
text-align:center;
font-size:20px;
letter-spacing:5px;
box-sizing:border-box;
}

/* BOTON */
button{
padding:12px 20px;
background:#27ae60;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

/* MENSAJE */
#msg{
margin-top:15px;
min-height:20px;
}

/* ROBOT */
.robot{
width:120px;
max-width:45%;
margin-top:18px;
display:block;
}

/* FOOTER */
.footer{
width:100%;
text-align:center;
color:white;
font-size:11px;
line-height:1.4;
padding:12px 10px 14px;
box-sizing:border-box;
margin-top:auto;
}

/* MOVIL PEQUEÑO */
@media (max-width:480px){

.logo{
width:150px;
margin-top:10px;
margin-bottom:16px;
}

.box{
padding:22px 16px;
border-radius:10px;
}

h2{
font-size:22px;
margin-top:0;
}

p{
font-size:14px;
}

input{
font-size:18px;
letter-spacing:4px;
padding:11px;
}

button{
width:100%;
font-size:16px;
padding:12px;
}

.robot{
width:100px;
margin-top:16px;
}

.footer{
font-size:10px;
padding-bottom:10px;
}

}

</style>

</head>

<body>

<img src="assets/images/logotipo.png" alt="QUIZ1000" class="logo">

<div class="box">

<h2>Validar código</h2>

<p>Revisa tu correo e ingresa el código</p>

<input type="text" id="codigo" placeholder="000000">

<button onclick="validar()">Validar</button>

<p id="msg"></p>

</div>

<img src="assets/images/robot.png" alt="Robot QUIZ1000" class="robot">

<footer class="footer">
© 2026 Quiz1000 LLC.<br>
All rights reserved. QUIZ1000 is a trademark of Quiz1000 LLC.<br>
www.Quiz1000.llc
</footer>

<script>

async function validar(){

const codigo = document.getElementById("codigo").value;

const email = localStorage.getItem("recuperarEmail");

const res = await fetch("/validar-codigo",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({
email,
codigo
})

});

const data = await res.json();

if(data.ok){

window.location.href = "nueva-password.html";

}else{

document.getElementById("msg").innerText =
"Código incorrecto";

}

}

</script>

</body>
</html>

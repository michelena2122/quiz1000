<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Validar código</title>

<style>

body{
font-family:Arial, sans-serif;
background:url("assets/images/fondo-rayos.jpg") no-repeat center center fixed;
background-size:cover;
margin:0;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding:20px 15px 110px;
box-sizing:border-box;
}

/* LOGO */
.logo{
width:180px;
max-width:70%;
margin-top:20px;
margin-bottom:20px;
display:block;
}

/* CAJA */
.box{
background:rgba(0,0,0,0.85);
color:white;
padding:28px 20px;
border-radius:12px;
text-align:center;
width:100%;
max-width:350px;
box-sizing:border-box;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
border-radius:6px;
border:none;
text-align:center;
font-size:20px;
letter-spacing:5px;
box-sizing:border-box;
}

/* BOTON */
button{
padding:12px 20px;
background:#27ae60;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

/* MENSAJE */
#msg{
margin-top:15px;
min-height:20px;
}

/* ROBOT */
.robot{
width:120px;
max-width:45%;
margin-top:18px;
display:block;
}

/* FOOTER */
.footer{
width:100%;
text-align:center;
color:white;
font-size:11px;
line-height:1.4;
padding:12px 10px 14px;
box-sizing:border-box;
margin-top:auto;
}

/* MOVIL PEQUEÑO */
@media (max-width:480px){

.logo{
width:150px;
margin-top:10px;
margin-bottom:16px;
}

.box{
padding:22px 16px;
border-radius:10px;
}

h2{
font-size:22px;
margin-top:0;
}

p{
font-size:14px;
}

input{
font-size:18px;
letter-spacing:4px;
padding:11px;
}

button{
width:100%;
font-size:16px;
padding:12px;
}

.robot{
width:100px;
margin-top:16px;
}

.footer{
font-size:10px;
padding-bottom:10px;
}

}

</style>

</head>

<body>

<img src="assets/images/logotipo.png" alt="QUIZ1000" class="logo">

<div class="box">

<h2>Validar código</h2>

<p>Revisa tu correo e ingresa el código</p>

<input type="text" id="codigo" placeholder="000000">

<button onclick="validar()">Validar</button>

<p id="msg"></p>

</div>

<img src="assets/images/robot.png" alt="Robot QUIZ1000" class="robot">

<footer class="footer">
© 2026 Quiz1000 LLC.<br>
All rights reserved. QUIZ1000 is a trademark of Quiz1000 LLC.<br>
www.Quiz1000.llc
</footer>

<script>

async function validar(){

const codigo = document.getElementById("codigo").value;

const email = localStorage.getItem("recuperarEmail");

const res = await fetch("/validar-codigo",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({
email,
codigo
})

});

const data = await res.json();

if(data.ok){

window.location.href = "nueva-password.html";

}else{

document.getElementById("msg").innerText =
"Código incorrecto";

}

}
(function(){
    const jugador = JSON.parse(localStorage.getItem("jugadorActual") || "null")
                 || JSON.parse(localStorage.getItem("usuarioLogueado") || "null");
    if(!jugador) return;

    const fecha = new Date().toLocaleDateString("es-MX", {
        weekday: "long", day: "numeric", month: "long", year: "numeric"
    });

    const bar = document.createElement("div");
    bar.id = "sessionBar";
    bar.style.cssText = `
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 9999;
        background: rgba(0,0,0,0.75);
        backdrop-filter: blur(6px);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 16px;
        font-size: 13px;
        color: #fff;
        font-family: sans-serif;
        border-bottom: 1px solid rgba(255,255,255,0.1);
    `;
    bar.innerHTML = `
        <span>👤 <strong>${jugador.nombre || "Jugador"}</strong></span>
        <span style="color:#aaa;">🗓️ ${fecha}</span>
        <a href="/perfil.html"
           style="background:#1a56db;color:#fff;padding:4px 12px;border-radius:6px;
                  text-decoration:none;font-weight:bold;font-size:12px;">
            Mi Perfil
        </a>
    `;
    document.body.prepend(bar);

    // Empujar el contenido para que no quede tapado por la barra
    document.body.style.paddingTop = (document.body.style.paddingTop
        ? (parseInt(document.body.style.paddingTop) + 36) : 36) + "px";
})();
// Mensaje consola
console.log("%c⛔ ZONA RESTRINGIDA", "color:#ff0000;font-size:28px;font-weight:bold;");
console.log("%cSi alguien te pidió abrir esto, te están intentando estafar.", "color:#ff9800;font-size:14px;");
console.log("%cQUIZ1000 nunca te pedirá ejecutar código aquí.", "color:#ffffff;font-size:14px;");
</script>

</body>
</html>

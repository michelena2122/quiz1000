<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>QUIZ1000 Admin</title>

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    padding:40px;
}

h1{
    color:#00ffcc;
}

table{
    width:100%;
    border-collapse: collapse;
    margin-top:20px;
}

td,th{
    border:1px solid #444;
    padding:8px;
    text-align:center;
}

th{
    background:#222;
}

.estado{
    margin-top:20px;
    font-size:20px;
}

.bloque-admin{
    margin-top:30px;
    background:#1b1b1b;
    border:1px solid #333;
    border-radius:10px;
    padding:20px;
}

.bloque-admin h2{
    margin-top:0;
    color:#00ffcc;
}

.campo{
    margin-bottom:15px;
}

.campo label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
}

.campo input{
    width:100%;
    max-width:280px;
    padding:10px;
    border-radius:6px;
    border:1px solid #555;
    background:#222;
    color:white;
    font-size:16px;
}

button{
    background:#00ffcc;
    color:#111;
    border:none;
    padding:10px 16px;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

#mensajeTipoCambio{
    margin-top:12px;
    font-weight:bold;
}
</style>

</head>

<body>

<h1>QUIZ1000 - Panel Administrador</h1>

<div class="estado">
    Casillas ocupadas: <span id="ocupadas">0</span> / 50
</div>

<div id="estadoTablero" style="margin-top:10px;font-size:18px;color:#00ffcc;">
    TABLERO ACTIVO
</div>

<div id="ganador" style="margin-top:20px;font-size:18px;color:#ffd700;"></div>

<div class="bloque-admin">
    <h2>Tipo de cambio</h2>

    <div class="campo">
        <label for="tipoCambioCobro">Tipo de cambio de cobro (MXN por USD)</label>
        <input id="tipoCambioCobro" type="number" step="0.01">
    </div>

    <div class="campo">
        <label for="tipoCambioPremio">Tipo de cambio para pago del premio (MXN por USD)</label>
        <input id="tipoCambioPremio" type="number" step="0.01">
    </div>

    <button id="btnGuardarTipoCambio">Guardar tipo de cambio</button>

    <div id="mensajeTipoCambio"></div>
</div>
<!-- ============================= -->
<!-- ADMINISTRAR PREGUNTAS -->
<!-- ============================= -->
<div class="bloque-admin" style="margin-top:40px;">

    <h2>Modificar preguntas</h2>

    <button id="btnCargarPreguntas">Cargar preguntas</button>
    <button id="btnOcultarPreguntas">Ocultar preguntas</button>
    <button id="btnGuardarPreguntas">Guardar preguntas</button>

    <div id="mensajePreguntas" style="margin-top:10px;"></div>

    <div id="listaPreguntas" style="margin-top:20px;"></div>

</div>

<table>
    <thead>
        <tr>
            <th>Jugador</th>
            <th>Casilla</th>
            <th>Email</th>
            <th>Tiempo</th>
        </tr>
    </thead>

    <tbody id="tabla"></tbody>
</table>

<div class="bloque-admin" style="margin-top:40px;">
    <h2>Tableros completos</h2>

    <button id="btnCargarIncompletos">Ver tableros incompletos</button>
    <button id="btnOcultarIncompletos">Ocultar</button>

    <div id="listaIncompletos" style="margin-top:20px;"></div>

</div>

    <button id="btnCargarTablerosCompletos">Cargar tableros completos</button>
    <button id="btnOcultarTablerosCompletos">Ocultar tableros completos</button>

    <div id="mensajeTablerosCompletos" style="margin-top:10px;"></div>

    <div id="listaTablerosCompletos" style="margin-top:20px;"></div>
</div>
</table>

<script>

// =============================
// TABLERO (YA EXISTENTE)
// =============================
// =============================
// TABLERO (YA EXISTENTE)
// =============================
async function cargarTablero(){

    console.log("ENTRANDO A cargarTablero()");
    console.log("URL FETCH ADMIN:", "/admin/tablero");

    const res = await fetch("/admin/tablero");
    console.log("STATUS /admin/tablero:", res.status);

    const textoCrudo = await res.text();
    console.log("RESPUESTA CRUDA /admin/tablero:", textoCrudo);

    const data = JSON.parse(textoCrudo);
    console.log("DATA PARSEADA /admin/tablero:", data);

    document.getElementById("ocupadas").innerText = data.ocupadas;

    const tabla = document.getElementById("tabla");
    tabla.innerHTML = "";

    data.casillas.forEach(c => {

        const fila = document.createElement("tr");

        fila.innerHTML = `
        <td>${c.jugador}</td>
        <td>${c.casilla}</td>
        <td>${c.email}</td>
        <td>${c.tiempo}</td>
        `;

        tabla.appendChild(fila);

    });

    const estado = document.getElementById("estadoTablero");

    if(data.completo){
        estado.innerText = "⚠ TABLERO COMPLETO";
        estado.style.color = "red";
    }else{
        estado.innerText = "TABLERO ACTIVO";
        estado.style.color = "#00ffcc";
    }

    if(data.casillas.length > 0){

        const tiempos = data.casillas.map(c => {

            const partes = c.tiempo.split(":");

            const minutos = parseFloat(partes[0]) || 0;
            const segundos = parseFloat(partes[1]) || 0;
            const decimas = parseFloat(partes[2]) || 0;
            const centesimas = parseFloat(partes[3]) || 0;

            const tiempoTotal =
                (minutos * 60) +
                segundos +
                (decimas / 10) +
                (centesimas / 100);

            return {
                jugador: c.jugador,
                casilla: c.casilla,
                tiempo: tiempoTotal,
                tiempoTexto: c.tiempo
            };
        });

        tiempos.sort((a,b) => a.tiempo - b.tiempo);

        const ganador = tiempos[0];

        document.getElementById("ganador").innerHTML =
            "🏆 Ganador actual: <b>" +
            ganador.jugador +
            "</b> — Casilla " +
            ganador.casilla +
            " — Tiempo " +
            ganador.tiempoTexto;

    }else{
        document.getElementById("ganador").innerHTML = "";
    }
}


// =============================
// TIPO DE CAMBIO (YA EXISTENTE)
// =============================
async function cargarTipoCambio(){
    try{
        const res = await fetch("/api/admin/tipo-cambio");
        const data = await res.json();

        if(!data.ok){
            return;
        }

        document.getElementById("tipoCambioCobro").value = data.tipoCambioCobro;
        document.getElementById("tipoCambioPremio").value = data.tipoCambioPremio;

    }catch(error){
        console.log("Error cargando tipo de cambio:", error);
    }
}

document.getElementById("btnGuardarTipoCambio").addEventListener("click", async function(){

    const tipoCambioCobro = document.getElementById("tipoCambioCobro").value;
    const tipoCambioPremio = document.getElementById("tipoCambioPremio").value;
    const mensaje = document.getElementById("mensajeTipoCambio");

    try{

        const res = await fetch("/api/admin/tipo-cambio", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                tipoCambioCobro,
                tipoCambioPremio
            })
        });

        const data = await res.json();

        if(data.ok){
            mensaje.textContent = "Tipo de cambio guardado correctamente";
            mensaje.style.color = "#00ffcc";
        }else{
            mensaje.textContent = data.mensaje || "Error guardando tipo de cambio";
            mensaje.style.color = "red";
        }

    }catch(error){
        console.log("Error guardando tipo de cambio:", error);
        mensaje.textContent = "Error de conexión";
        mensaje.style.color = "red";
    }

});


// =============================
// 🔥 NUEVO: PREGUNTAS
// =============================
const btnCargarPreguntas = document.getElementById("btnCargarPreguntas");
const btnOcultarPreguntas = document.getElementById("btnOcultarPreguntas");
const btnGuardarPreguntas = document.getElementById("btnGuardarPreguntas");
const listaPreguntas = document.getElementById("listaPreguntas");
const mensajePreguntas = document.getElementById("mensajePreguntas");

function mostrarMensajePreguntas(texto, color = "black") {
    mensajePreguntas.textContent = texto;
    mensajePreguntas.style.color = color;
}

function renderizarPreguntas(preguntas) {
    listaPreguntas.innerHTML = "";

    preguntas.forEach((item, index) => {

        const fila = document.createElement("div");

        fila.style.border = "1px solid #ccc";
        fila.style.padding = "10px";
        fila.style.marginBottom = "10px";
        fila.style.borderRadius = "8px";

        fila.innerHTML = `
            <div><b>Resultado:</b> ${item.resultado}</div>

            <input 
                type="text"
                value="${item.pregunta.replace(/"/g, "&quot;")}"
                data-index="${index}"
                class="input-pregunta"
                style="width:100%; margin-top:5px; padding:5px;"
            >
        `;

        listaPreguntas.appendChild(fila);

    });
}
function ocultarPreguntas() {
    listaPreguntas.innerHTML = "";
    mostrarMensajePreguntas("Preguntas ocultas.", "#00ffcc");
}
async function cargarPreguntas() {
    try {
        mostrarMensajePreguntas("Cargando...", "blue");

        const res = await fetch("/api/preguntas");
        const preguntas = await res.json();

        renderizarPreguntas(preguntas);

        mostrarMensajePreguntas("OK", "#00ffcc");

    } catch (error) {
        console.log(error);
        mostrarMensajePreguntas("Error cargando", "red");
    }
}

async function guardarPreguntas() {
    try {

        const inputs = document.querySelectorAll(".input-pregunta");

        const preguntas = [];

        inputs.forEach((input, i) => {
            preguntas.push({
                pregunta: input.value.trim(),
                resultado: i + 1
            });
        });

        mostrarMensajePreguntas("Guardando...", "blue");

        const res = await fetch("/api/preguntas", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(preguntas)
        });

        const data = await res.json();

        console.log(data);

        mostrarMensajePreguntas("Guardado OK", "#00ffcc");

    } catch (error) {
        console.log(error);
        mostrarMensajePreguntas("Error guardando", "red");
    }
}

// listeners seguros
if(btnCargarPreguntas){
    btnCargarPreguntas.addEventListener("click", cargarPreguntas);
}
if(btnOcultarPreguntas){
    btnOcultarPreguntas.addEventListener("click", ocultarPreguntas);
}
if(btnGuardarPreguntas){
    btnGuardarPreguntas.addEventListener("click", guardarPreguntas);
}
// =============================
// TABLEROS COMPLETOS
// =============================
const btnCargarTablerosCompletos = document.getElementById("btnCargarTablerosCompletos");
const btnOcultarTablerosCompletos = document.getElementById("btnOcultarTablerosCompletos");
const mensajeTablerosCompletos = document.getElementById("mensajeTablerosCompletos");
const listaTablerosCompletos = document.getElementById("listaTablerosCompletos");

function mostrarMensajeTablerosCompletos(texto, color = "black") {
    mensajeTablerosCompletos.textContent = texto;
    mensajeTablerosCompletos.style.color = color;
}

function renderizarTablerosCompletos(tableros) {
    listaTablerosCompletos.innerHTML = "";

    if (!tableros || tableros.length === 0) {
        listaTablerosCompletos.innerHTML = "<div>No hay tableros completos.</div>";
        return;
    }

    tableros.forEach(tablero => {
        const fila = document.createElement("div");

        fila.style.border = "1px solid #ccc";
        fila.style.padding = "12px";
        fila.style.marginBottom = "10px";
        fila.style.borderRadius = "8px";

        fila.innerHTML = `
            <div><b>Folio:</b> ${tablero.id}</div>
            <div><b>Completo:</b> ${tablero.completo ? "Sí" : "No"}</div>
            <div><b>Casillas pagadas:</b> ${tablero.totalPagadas}</div>

            <div style="margin-top:10px;">
                <button type="button" onclick="verDetalleTableroCompleto('${tablero.id}')">
                    Ver detalle
                </button>
                <button type="button" onclick="ocultarDetalleTableroCompleto('${tablero.id}')">
                    Ocultar detalle
                </button>
            </div>

            <div id="detalle-${tablero.id}" style="margin-top:15px;"></div>
        `;

        listaTablerosCompletos.appendChild(fila);
    });
}
async function verDetalleTableroCompleto(folio) {
    const contenedor = document.getElementById(`detalle-${folio}`);

    if (!contenedor) {
        return;
    }

    contenedor.innerHTML = "Cargando detalle...";

    try {
        const res = await fetch(`/api/admin/tablero-detalle/${encodeURIComponent(folio)}`);
        const data = await res.json();

        if (!data.ok) {
            contenedor.innerHTML = "<div style='color:red;'>Error cargando detalle.</div>";
            return;
        }

        if (!data.casillas || data.casillas.length === 0) {
            contenedor.innerHTML = "<div>No hay casillas pagadas en este tablero.</div>";
            return;
        }

        let html = `
            <table style="width:100%; margin-top:10px; border-collapse:collapse;">
                <thead>
                    <tr>
                        <th style="border:1px solid #ccc; padding:8px;">Jugador</th>
                        <th style="border:1px solid #ccc; padding:8px;">Casilla</th>
                        <th style="border:1px solid #ccc; padding:8px;">Email</th>
                        <th style="border:1px solid #ccc; padding:8px;">Tiempo</th>
                    </tr>
                </thead>
                <tbody>
        `;

        data.casillas.forEach(c => {
            html += `
                <tr>
                    <td style="border:1px solid #ccc; padding:8px;">${c.jugador || ""}</td>
                    <td style="border:1px solid #ccc; padding:8px;">${c.casilla || ""}</td>
                    <td style="border:1px solid #ccc; padding:8px;">${c.email || ""}</td>
                    <td style="border:1px solid #ccc; padding:8px;">${c.tiempo || ""}</td>
                </tr>
            `;
        });

        html += `
                </tbody>
            </table>
        `;

        contenedor.innerHTML = html;

    } catch (error) {
        console.log("ERROR DETALLE TABLERO COMPLETO:", error);
        contenedor.innerHTML = "<div style='color:red;'>Error de conexión.</div>";
    }
}

function ocultarDetalleTableroCompleto(folio) {
    const contenedor = document.getElementById(`detalle-${folio}`);

    if (contenedor) {
        contenedor.innerHTML = "";
    }
}
async function cargarTablerosCompletos() {
    try {
        mostrarMensajeTablerosCompletos("Cargando...", "blue");

        const res = await fetch("/api/admin/tableros-completos");
        const data = await res.json();

        if (!data.ok) {
            mostrarMensajeTablerosCompletos("Error cargando tableros completos.", "red");
            return;
        }

        renderizarTablerosCompletos(data.tableros);
        mostrarMensajeTablerosCompletos("Tableros completos cargados correctamente.", "#00ffcc");

    } catch (error) {
        console.log("ERROR CARGANDO TABLEROS COMPLETOS:", error);
        mostrarMensajeTablerosCompletos("Error de conexión.", "red");
    }
}

function ocultarTablerosCompletos() {
    listaTablerosCompletos.innerHTML = "";
    mostrarMensajeTablerosCompletos("Tableros completos ocultos.", "#00ffcc");
}

if (btnCargarTablerosCompletos) {
    btnCargarTablerosCompletos.addEventListener("click", cargarTablerosCompletos);
}

if (btnOcultarTablerosCompletos) {
    btnOcultarTablerosCompletos.addEventListener("click", ocultarTablerosCompletos);
}
// =============================
// INIT
// =============================
cargarTablero();
cargarTipoCambio();

// =============================
// TABLEROS INCOMPLETOS
// =============================

const tablaIncompletos = document.getElementById("tablaIncompletos");
const btnCargarIncompletos = document.getElementById("btnCargarIncompletos");
const btnOcultarIncompletos = document.getElementById("btnOcultarIncompletos");

async function cargarTablerosIncompletos(){

    const res = await fetch("/admin/tableros-incompletos");
    const data = await res.json();

    tablaIncompletos.innerHTML = "";

    data.tableros.forEach(t => {

        let color = "#00ffcc";

        if(t.estatus === "vencido") color = "orange";
        if(t.estatus === "reembolso_en_proceso") color = "gold";
        if(t.estatus === "reembolsado") color = "red";

        const fila = document.createElement("tr");

        fila.innerHTML = `
            <td>${t.id}</td>
            <td style="color:${color}; font-weight:bold;">${t.estatus}</td>
            <td>${t.estadoReembolso || "pendiente"}</td>
            <td>${t.reembolsoProcesado}</td>
            <td>${t.premioPagado}</td>
        `;

        tablaIncompletos.appendChild(fila);

    });

}

function ocultarTablerosIncompletos(){
    tablaIncompletos.innerHTML = "";
}

if (btnCargarIncompletos) {
    btnCargarIncompletos.addEventListener("click", cargarTablerosIncompletos);
}

if (btnOcultarIncompletos) {
    btnOcultarIncompletos.addEventListener("click", ocultarTablerosIncompletos);
}
setInterval(cargarTablero, 3000);

</script>

</body>
</html>

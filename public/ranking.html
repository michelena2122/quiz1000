<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ranking del Tablero</title>
<style>
body { font-family: Arial; padding: 30px; background:#f2f8ff; }
h2 { text-align:center; }
.item {
    padding:10px;
    margin-bottom:8px;
    background:white;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
}
.primero {
    background:#d4edda;
    font-weight:bold;
}
</style>
</head>
<body>

<h2>🏆 Ranking del Tablero</h2>

<div id="rankingLista"></div>

<script>

const params = new URLSearchParams(window.location.search);
const folio = params.get("folio");

const contenedor = document.getElementById("rankingLista");

if(!folio){
    contenedor.innerHTML = "<p>Folio no recibido</p>";
}else{

    fetch(`/api/ranking/${folio}`)
    .then(res => res.json())
    .then(data => {

        console.log("DATA RANKING:", data); // 👈 DEBUG

        if(!data.ok || !data.ranking || data.ranking.participantes.length === 0){
            contenedor.innerHTML = "<p>No hay participantes aún.</p>";
            return;
        }

        const lista = data.ranking.participantes;

        lista.forEach((jugador, index) => {

            const div = document.createElement("div");
            div.classList.add("item");

            if(index === 0){
                div.classList.add("primero");
            }

            div.innerHTML = `
                <span>
                    #${index + 1} ${jugador.nombre}
                    <br>
                    Casillas: ${jugador.numeros.length}
                </span>
                <span>
                    ⏱ ${jugador.mejorTiempoTexto}
                </span>
            `;

            contenedor.appendChild(div);
        });

    })
    .catch(err => {
        console.error("ERROR:", err);
        contenedor.innerHTML = "<p>Error cargando ranking</p>";
    });

}

</script>

</body>
</html>

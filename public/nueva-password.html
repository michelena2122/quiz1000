<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nueva contraseña</title>

<style>

body{
font-family:Arial;
background:url("assets/images/fondo-rayos.jpg") no-repeat center center fixed;
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:rgba(0,0,0,0.85);
color:white;
padding:40px;
border-radius:12px;
text-align:center;
width:350px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
border-radius:6px;
border:none;
}

button{
padding:10px 20px;
background:#27ae60;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>Nueva contraseña</h2>

<p>Escribe tu nueva contraseña</p>

<input type="password" id="pass1" placeholder="Nueva contraseña">

<input type="password" id="pass2" placeholder="Repetir contraseña">

<button onclick="cambiar()">Cambiar contraseña</button>

<p id="msg"></p>

</div>

<script>

async function cambiar(){

const p1 = document.getElementById("pass1").value;
const p2 = document.getElementById("pass2").value;

if(p1 !== p2){

document.getElementById("msg").innerText =
"Las contraseñas no coinciden";

return;

}

const email = localStorage.getItem("recuperarEmail").toLowerCase().trim();

const res = await fetch("/cambiar-password",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({
email,
password:p1
})

});

const data = await res.json();

if(data.ok){

document.getElementById("msg").innerText =
"Contraseña actualizada";

setTimeout(()=>{
window.location.href="login.html";
},2000);

}else{

document.getElementById("msg").innerText =
"No se pudo cambiar";

}

}

</script>

</body>
</html>

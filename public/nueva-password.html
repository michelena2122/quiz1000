<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nueva contraseña - Quiz $1000</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; }

body{
    font-family:Arial, sans-serif;
    min-height:100vh;
    background:url("/assets/images/fondo-rayos.jpg") center/cover no-repeat fixed;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px 14px;
}

.nueva-logo{
    margin-bottom:14px;
    text-align:center;
}

.nueva-logo img{
    width:120px;
    max-width:48vw;
    height:auto;
}

.nueva-robot{
    width:90px;
    max-width:35vw;
    height:auto;
    margin-bottom:14px;
}

.box{
    background:rgba(0,0,0,0.82);
    color:white;
    padding:30px 24px;
    border-radius:14px;
    text-align:center;
    width:100%;
    max-width:360px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    backdrop-filter:blur(6px);
}

.box h2{
    font-size:22px;
    margin-bottom:8px;
    color:#22c55e;
}

.box p{
    font-size:14px;
    color:#ccc;
    margin-bottom:16px;
}

input{
    width:100%;
    padding:12px 14px;
    margin-bottom:12px;
    border-radius:8px;
    border:none;
    font-size:15px;
    outline:none;
    background:white;
    color:#111;
}

button{
    width:100%;
    padding:13px;
    background:#22c55e;
    border:none;
    color:white;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
    margin-top:4px;
}

button:hover{ opacity:0.92; transform:translateY(-1px); }

#msg{
    min-height:20px;
    margin-top:12px;
    font-size:14px;
    color:#facc15;
}

.home-nueva{
    margin:16px 0 6px;
    text-align:center;
}

.footer-nueva{
    margin-top:8px;
    text-align:center;
    color:#dbeafe;
    font-size:12px;
    line-height:1.5;
}

@media(max-width:480px){
    .box{ padding:24px 16px; }
    .nueva-robot{ width:75px; }
}
</style>

</head>

<body>

<div class="nueva-logo">
    <img src="/assets/images/logotipo.png" alt="Quiz $1000">
</div>

<img src="/assets/images/robot-editarperfil.png"
     class="nueva-robot"
     alt="Robot">

<div class="box">

    <h2>Nueva contraseña</h2>

    <p>Escribe tu nueva contraseña</p>

    <input type="password" id="pass1" placeholder="Nueva contraseña">

    <input type="password" id="pass2" placeholder="Repetir contraseña">

    <button onclick="cambiar()">Cambiar contraseña</button>

    <p id="msg"></p>

</div>

<div class="home-nueva">
    <a href="/index">
        <img src="/assets/images/home-icon.png"
             alt="Home"
             style="width:50px; height:auto; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4));">
    </a>
</div>

<footer class="footer-nueva">
    © 2026 Quiz1000 LLC.All rights reserved. QUIZ1000 is a trademark of Quiz1000 LLC.<br>
    www.Quiz1000.llc
</footer>

</div>

<script>

async function cambiar(){

const p1 = document.getElementById("pass1").value;
const p2 = document.getElementById("pass2").value;

if(p1 !== p2){

document.getElementById("msg").innerText =
"Las contraseñas no coinciden";

return;

}

const email = localStorage.getItem("recuperarEmail").toLowerCase().trim();

const res = await fetch("/cambiar-password",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({
email,
password:p1
})

});

const data = await res.json();

if(data.ok){

document.getElementById("msg").innerText =
"Contraseña actualizada";

setTimeout(()=>{
window.location.href="login.html";
},2000);

}else{

document.getElementById("msg").innerText =
"No se pudo cambiar";

}

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Perfil - Quiz $1000</title>
<link rel="stylesheet" href="css/styles.css?v=3">

<style>
.btn-invitar-whatsapp{
    display:inline-block;
    margin:10px 0;
    padding:10px 14px;
    background:#25D366;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}

.perfil-contenedor{
    width:100%;
    max-width:700px;
    margin:0 auto;
    padding:20px 15px 40px 15px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    box-sizing:border-box;
}

.icono-perfil{
    display:block !important;
    width:100%;
    max-width:220px;
    margin:0 auto 25px auto !important;
}

.robots-menu{
    width:100%;
    display:flex !important;
    justify-content:center !important;
    align-items:flex-start !important;
    gap:30px;
    margin:0 auto 30px auto !important;
    flex-wrap:wrap;
}

.robot-btn{
    display:block;
    width:140px !important;
    max-width:42vw;
    height:auto;
    cursor:pointer;
    transition:transform 0.2s;
}

.robot-btn:hover{
    transform:scale(1.08);
}

footer{
    width:100%;
    text-align:center !important;
    font-size:12px;
    color:#555;
    margin:30px auto 20px auto !important;
    padding:20px 15px 30px 15px;
    box-sizing:border-box;
}

@media(max-width:600px){
    .perfil-contenedor{
        padding:20px 10px 30px 10px;
    }

    .icono-perfil{
        max-width:180px;
        margin:0 auto 20px auto !important;
    }

    .robots-menu{
        gap:18px;
        margin:0 auto 20px auto !important;
    }

    .robot-btn{
        width:130px !important;
        max-width:40vw;
    }

    footer{
        font-size:11px;
        line-height:1.5;
        padding:18px 12px 28px 12px;
    }
}
</style>
</head>
<body>

<div class="perfil-contenedor">

    <img src="./assets/images/perfil.png"
         class="icono-perfil"
         alt="Mi Perfil">

    <!-- BOTONES ROBOT -->
    <div class="robots-menu">
        <img src="/assets/images/robot-editarperfil.png"
             class="robot-btn"
             id="btnEditarPerfil"
             alt="Editar perfil">

        <img src="/assets/images/robot-tableroperfil.png"
             class="robot-btn"
             id="btnVerTableros"
             alt="Ver tableros">

        <img src="/assets/images/robot.png"
             class="robot-btn"
             id="btnVerReferidos"
             alt="Mis referidos"
             style="width:60px;">
    </div>

    <form id="perfilForm" class="perfil-grid" style="display:none;">

        <div class="campo">
            <label>Nombre</label>
            <input type="text" id="perfilNombre" disabled>
        </div>

        <div class="campo">
            <label>Apellidos</label>
            <input type="text" id="perfilApellidos" disabled>
        </div>

        <div class="campo">
            <label>Edad</label>
            <input type="number" id="perfilEdad">
        </div>

        <div class="campo">
            <label>Email</label>
            <input type="email" id="perfilEmail">
        </div>

        <div class="campo">
            <label>Teléfono</label>
            <input type="text" id="perfilTelefono">
        </div>

        <div class="campo">
            <label>Nueva Contraseña</label>
            <input type="password" id="perfilPassword">
        </div>

        <div class="campo-boton">
            <button type="submit">Guardar Cambios</button>
        </div>

        <div class="campo" style="text-align:left;margin-top:16px;">
            <label style="font-weight:bold;margin-bottom:8px;display:block;">
                Preferencias de notificaciones
            </label>
            <label style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-weight:normal;">
                <input type="checkbox" id="bajaEmail">
                Darme de baja del Email
            </label>
            <label style="display:flex;align-items:center;gap:8px;font-weight:normal;">
                <input type="checkbox" id="bajaWhatsapp">
                Darme de baja de WhatsApp
            </label>
        </div>

        <div class="campo-boton" style="margin-top:24px;">
            <button type="button" onclick="logout()"
                style="background:#c0392b;color:white;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-size:16px;font-weight:bold;width:100%;">
                Cerrar sesión
            </button>
        </div>

    </form>

    <div id="seccionTableros" style="display:none;">
        <hr style="margin:40px 0;">
        <h2>🎯 Mis Tableros</h2>
        <div id="misTablerosPerfil"></div>
    </div>

    <div id="seccionReferidos" style="display:none;">
        <hr style="margin:40px 0;">
        <h2>🤝 Mis Referidos</h2>
        <div id="misReferidosPerfil">
            <p style="color:#aaa;">Cargando...</p>
        </div>
    </div>

</div>

<!-- ICONO HOME -->
<a href="index" class="home-icon">
    <img src="./assets/images/home-icon.png" alt="Home">
</a>
<div style="text-align:center; padding:16px 0 8px; display:flex; justify-content:center; gap:24px; align-items:center;">
    <a href="https://instagram.com/quiz1000game" target="_blank" rel="noopener" title="Instagram"
       style="color:#E1306C; font-size:30px; text-decoration:none; transition:opacity 0.2s;"
       onmouseover="this.style.opacity='0.75'" onmouseout="this.style.opacity='1'">
        <i class="fab fa-instagram"></i>
    </a>
    <a href="https://www.facebook.com/profile.php?id=61579571397153&ref=1" target="_blank" rel="noopener" title="Facebook"
       style="color:#1877F2; font-size:30px; text-decoration:none; transition:opacity 0.2s;"
       onmouseover="this.style.opacity='0.75'" onmouseout="this.style.opacity='1'">
        <i class="fab fa-facebook"></i>
    </a>
    <a href="https://www.tiktok.com/@quiz1000game" target="_blank" rel="noopener" title="TikTok"
       style="color:#ffffff; font-size:30px; text-decoration:none; transition:opacity 0.2s;"
       onmouseover="this.style.opacity='0.75'" onmouseout="this.style.opacity='1'">
        <i class="fab fa-tiktok"></i>
    </a>
</div>
<footer>

www.Quiz1000.llc
</footer>

<script>
// PROTEGER PERFIL
const usuario = JSON.parse(localStorage.getItem("usuarioLogueado"));

if(!usuario){
    window.location.href = "login.html";
}

// Esperar a que cargue el DOM
document.addEventListener("DOMContentLoaded", function(){

    // sincronizar login con perfil
    const usuarioLogueado = JSON.parse(localStorage.getItem("usuarioLogueado"));

    if(usuarioLogueado && !localStorage.getItem("jugadorActual")){
        localStorage.setItem("jugadorActual", JSON.stringify(usuarioLogueado));
    }

    const jugador = JSON.parse(localStorage.getItem("jugadorActual"));

    if(jugador){
        document.getElementById("perfilNombre").value = jugador.nombre || "";
        document.getElementById("perfilApellidos").value = jugador.apellidos || "";
        document.getElementById("perfilEdad").value = jugador.edad || "";
        document.getElementById("perfilEmail").value = jugador.email || "";
        document.getElementById("perfilTelefono").value = jugador.telefono || "";
            document.getElementById("bajaEmail").checked   = jugador.bajaEmail == 1;
            document.getElementById("bajaWhatsapp").checked = jugador.bajaWhatsapp == 1;

            if(jugador.tableroID){
            const estado = JSON.parse(localStorage.getItem("tableroEstado_" + jugador.tableroID));

            if(estado && estado.casillasResueltas){
                const resueltas = estado.casillasResueltas.length;
                const total = 50;
                const faltan = total - resueltas;

                const encabezado = document.getElementById("estadoTablero");
                if(encabezado){
                    encabezado.textContent =
                        `Este tablero tiene ${resueltas} números resueltos. Faltan ${faltan} para completarse`;
                }
            }
        }
    }

    // ============================
    // MOSTRAR TABLEROS EN PERFIL
    // ============================
    const contenedorTableros = document.getElementById("misTablerosPerfil");

    async function cargarMisTableros(){

        const jugador = JSON.parse(localStorage.getItem("jugadorActual"));

        if(!jugador || !jugador.id){
            contenedorTableros.innerHTML = "<p>No hay historial aún.</p>";
            return;
        }

        try{

            const res = await fetch(`/api/mis-tableros/${jugador.id}`);
            const data = await res.json();

            if(!data.ok || !data.tableros || Object.keys(data.tableros).length === 0){
                contenedorTableros.innerHTML = "<p>Aún no participas en ningún tablero.</p>";
                return;
            }

            contenedorTableros.innerHTML = "";

            const tableros = data.tableros;

            for(let folio in tableros){

                const compras = tableros[folio];

                const details = document.createElement("details");
                details.classList.add("tablero-perfil-card");

                const lista = compras.map(c => {
                    return `<li>Número ${c.numero} — Tiempo: ${c.tiempo || "Sin registro"}</li>`;
                }).join("");

                const linkTablero = `${window.location.origin}/tablero?folio=${encodeURIComponent(folio)}`;
                const mensajeWhatsapp = encodeURIComponent(
                    `Descubrí este juego en donde puedes ganarte mil dólares! existe mucha probabilidad y la inversión es muy baja, ¡hay que completar un tablero de 50 números!. ¡Entra y participa! ${linkTablero}`
                );
                const whatsappUrl = `https://wa.me/?text=${mensajeWhatsapp}`;

                details.innerHTML = `
                    <summary>
                        Folio: <strong>${folio}</strong> — ${compras.length} casilla${compras.length !== 1 ? "s" : ""} pagada${compras.length !== 1 ? "s" : ""}
                    </summary>

                    <div style="background:#d4edda;border:1px solid #28a745;border-radius:8px;padding:10px 14px;margin-top:10px;color:#155724;font-weight:bold;text-align:center;">
                        ✅ Total de casillas pagadas en este tablero: ${compras.length}
                    </div>

                    <div style="margin-top:10px;">
                        <a href="${whatsappUrl}" target="_blank" class="btn-invitar-whatsapp">
                            Invita a tus amigos
                        </a>
                    </div>

                    <ul style="margin-top:10px;">
                        ${lista}
                    </ul>
                `;

                contenedorTableros.appendChild(details);
            }

        }catch(error){
            console.error("Error cargando mis tableros:", error);
            contenedorTableros.innerHTML = "<p>Error cargando historial.</p>";
        }
    }

    cargarMisTableros();

    // ============================
    // MOSTRAR TABLEROS GANADOS
    // ============================
    async function cargarMisPremios(){
        const jugador = JSON.parse(localStorage.getItem("jugadorActual"));
        if(!jugador || !jugador.id) return;

        try {
            const res  = await fetch(`/api/mis-premios/${jugador.id}`);
            const data = await res.json();

            // Buscar o crear el contenedor de premios dentro de seccionTableros
            let contenedorPremios = document.getElementById("misPremiosPerfil");
            if(!contenedorPremios){
                contenedorPremios = document.createElement("div");
                contenedorPremios.id = "misPremiosPerfil";
                const seccion = document.getElementById("seccionTableros");
                if(seccion) seccion.appendChild(contenedorPremios);
            }

            if(!data.ok || !data.premios || data.premios.length === 0){
                contenedorPremios.innerHTML = "";
                return;
            }

            contenedorPremios.innerHTML = `
                <h3 style="color:#ffd700;margin:24px 0 10px;text-align:center;font-size:18px;">
                    🏆 Tableros Ganados
                </h3>
            `;

            data.premios.forEach(premio => {
                const div = document.createElement("div");
                div.style.cssText = `
                    background:#0d2b0d;
                    border:2px solid #28a745;
                    border-radius:10px;
                    padding:16px;
                    margin-bottom:12px;
                    text-align:center;
                `;
                div.innerHTML = `
                    <div style="color:#ffd700;font-weight:bold;font-size:15px;">
                        🏆 ¡Ganaste el tablero <span style="text-transform:uppercase;">${premio.folio}</span>!
                    </div>
                    <div style="color:#ccc;margin-top:6px;font-size:13px;">
                        Tiempo ganador: <strong style="color:#fff;">${premio.mejorTiempo}</strong>
                    </div>
                    <div style="margin-top:14px;">
                        <a href="premio.html?folio=${encodeURIComponent(premio.folio)}"
                           style="display:inline-block;background:#ffd700;color:#000;font-weight:bold;
                                  padding:10px 24px;border-radius:8px;text-decoration:none;font-size:14px;">
                            🎁 Reclamar mi premio
                        </a>
                    </div>
                `;
                contenedorPremios.appendChild(div);
            });

        } catch(e){
            console.error("Error cargando premios:", e);
        }
    }

    cargarMisPremios();

    document.getElementById("perfilForm").addEventListener("submit", function(e){

        e.preventDefault();

        const jugadorActual = JSON.parse(localStorage.getItem("jugadorActual"));
        if(!jugadorActual) return;

        const email      = document.getElementById("perfilEmail").value;
        const telefono   = document.getElementById("perfilTelefono").value;
        const password   = document.getElementById("perfilPassword").value;
        const bajaEmail    = document.getElementById("bajaEmail").checked ? 1 : 0;
        const bajaWhatsapp = document.getElementById("bajaWhatsapp").checked ? 1 : 0;

        fetch("/actualizar-perfil", {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                id: jugadorActual.id,
                email,
                telefono,
                password,
                bajaEmail,
                bajaWhatsapp
            })
        })
        .then(res => res.json())
        .then(data => {

            if(data.ok){

                jugadorActual.email        = email;
                jugadorActual.telefono     = telefono;
                jugadorActual.bajaEmail    = bajaEmail;
                jugadorActual.bajaWhatsapp = bajaWhatsapp;

                localStorage.setItem("jugadorActual", JSON.stringify(jugadorActual));

                alert("Perfil actualizado correctamente ✅");

            }else{
                alert("Error actualizando perfil");
            }

        });

    });

    // ============================
    // BOTONES ROBOT PERFIL
    // ============================
    const btnEditar = document.getElementById("btnEditarPerfil");
    const btnTableros = document.getElementById("btnVerTableros");
    const formPerfil = document.getElementById("perfilForm");
    const seccionTableros = document.getElementById("seccionTableros");

    btnEditar.addEventListener("click", function(){
        formPerfil.style.display = "grid";
        seccionTableros.style.display = "none";
    });

    btnTableros.addEventListener("click", function(){
        formPerfil.style.display = "none";
        seccionTableros.style.display = "block";
    });
    // ============================
    // BOTON REFERIDOS
    // ============================
    const btnReferidos = document.getElementById("btnVerReferidos");
    const seccionReferidos = document.getElementById("seccionReferidos");

    btnReferidos.addEventListener("click", async function(){
        formPerfil.style.display = "none";
        seccionTableros.style.display = "none";
        seccionReferidos.style.display = "block";

        const jugador = JSON.parse(localStorage.getItem("jugadorActual") || "null");
        if(!jugador || !jugador.id) return;

        try {
            const res = await fetch(`/api/mis-referidos/${jugador.id}`);
            const data = await res.json();
            const contenedor = document.getElementById("misReferidosPerfil");

            if(!data.ok || data.total === 0){
                contenedor.innerHTML = `
                    <div style="text-align:center;padding:20px;color:#aaa;">
                        <p>Aún no tienes referidos.</p>
                        <p>Comparte tu link desde la página de pago y gana décimas de segundo.</p>
                    </div>`;
                return;
            }

            const siguiente = data.faltanParaSiguiente > 0
                ? `Faltan <strong>${data.faltanParaSiguiente}</strong> referidos para el siguiente nivel`
                : '🏆 ¡Nivel máximo alcanzado!';

            contenedor.innerHTML = `
                <div style="background:#0d2137;border:1px solid #00d4ff33;border-radius:12px;padding:20px;margin-bottom:20px;text-align:center;">
                    <div style="font-size:36px;font-weight:900;color:#00d4ff;">${data.total}</div>
                    <div style="color:#aaa;font-size:13px;">REFERIDOS PAGADOS</div>
                    <div style="color:#00ff88;font-size:15px;margin-top:8px;font-weight:700;">
                        ${data.descuentoActual > 0 ? `✅ Descuento aplicado: -${data.descuentoActual}s` : 'Necesitas 5 referidos para tu primer descuento'}
                    </div>
                    <div style="color:#aaa;font-size:12px;margin-top:4px;">${siguiente}</div>
                </div>
                <table style="width:100%;border-collapse:collapse;font-size:13px;">
                    <tr style="color:#aaa;border-bottom:1px solid #333;">
                        <th style="padding:8px;text-align:left;">Jugador</th>
                        <th style="padding:8px;text-align:center;">Casilla</th>
                        <th style="padding:8px;text-align:right;">Tablero</th>
                    </tr>
                    ${data.referidos.map(r => `
                        <tr style="border-bottom:1px solid #1a1a1a;color:#fff;">
                            <td style="padding:8px;">${r.nombre || 'Jugador'} ${r.apellidos || ''}</td>
                            <td style="padding:8px;text-align:center;color:#00d4ff;">#${r.casilla}</td>
                            <td style="padding:8px;text-align:right;color:#666;font-size:11px;">${r.tableroId}</td>
                        </tr>
                    `).join('')}
                </table>
            `;
        } catch(e) {
            document.getElementById("misReferidosPerfil").innerHTML = '<p style="color:red;">Error cargando referidos</p>';
        }
    });

});

const inputsCodigo = document.querySelectorAll(".codigo");

inputsCodigo.forEach((input, index) => {

    input.addEventListener("input", function(){

        if(this.value.length === 1 && index < inputsCodigo.length - 1){
            inputsCodigo[index + 1].focus();
        }

    });

    input.addEventListener("keydown", function(e){

        if(e.key === "Backspace" && this.value === "" && index > 0){
            inputsCodigo[index - 1].focus();
        }

    });

});

function logout(){

    localStorage.removeItem("usuarioLogueado");
    localStorage.removeItem("jugadorActual");
    localStorage.removeItem("jugadorId");

    window.location.href = "index.html";
}
(function(){
    const jugador = JSON.parse(localStorage.getItem("jugadorActual") || "null")
                 || JSON.parse(localStorage.getItem("usuarioLogueado") || "null");
    if(!jugador) return;

    const fecha = new Date().toLocaleDateString("es-MX", {
        weekday: "long", day: "numeric", month: "long", year: "numeric"
    });

    const bar = document.createElement("div");
    bar.id = "sessionBar";
    bar.style.cssText = `
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 9999;
        background: rgba(0,0,0,0.75);
        backdrop-filter: blur(6px);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 16px;
        font-size: 13px;
        color: #fff;
        font-family: sans-serif;
        border-bottom: 1px solid rgba(255,255,255,0.1);
    `;
    bar.innerHTML = `
        <span>👤 <strong>${jugador.nombre || "Jugador"}</strong></span>
        <span style="color:#aaa;">📅 ${fecha}</span>
        <a href="/perfil.html"
           style="background:#1a56db;color:#fff;padding:4px 12px;border-radius:6px;
                  text-decoration:none;font-weight:bold;font-size:12px;">
            Mi Perfil
        </a>
    `;
    document.body.prepend(bar);

    document.body.style.paddingTop = (document.body.style.paddingTop
        ? (parseInt(document.body.style.paddingTop) + 36) : 36) + "px";
})();
// Mensaje consola
console.log("%c⛔ ZONA RESTRINGIDA", "color:#ff0000;font-size:28px;font-weight:bold;");
console.log("%cSi alguien te pidió abrir esto, te están intentando estafar.", "color:#ff9800;font-size:14px;");
console.log("%cQUIZ1000 nunca te pedirá ejecutar código aquí.", "color:#ffffff;font-size:14px;");
</script>

</body>
</html>

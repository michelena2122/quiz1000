<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lobby - Quiz 1000</title>

<link rel="stylesheet" href="css/styles.css?v=2">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#cfe9ff;
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

header{
    text-align:center;
    padding:30px 20px 10px;
}

.logo{
    width:120px;
}

.acciones-iniciales{
    max-width:700px;
    margin:0 auto 20px;
    display:flex;
    gap:12px;
    padding:0 14px;
    box-sizing:border-box;
}

.btn-principal{
    flex:1;
    padding:14px 16px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
    font-size:15px;
}

.btn-tablero-curso{
    background:#003366;
    color:white;
}

.btn-tablero-nuevo{
    background:#1e8e3e;
    color:white;
}

.container{
    flex:1;
    max-width:700px;
    margin:0 auto 30px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#003366;
    margin-top:0;
}

.tablero-card{
    padding:16px;
    margin-bottom:16px;
    background:#f2f8ff;
    border-radius:12px;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:15px;
    flex-wrap:wrap;
}

.tablero-info{
    flex:1;
    min-width:220px;
}

.tablero-folio{
    font-size:18px;
    color:#003366;
    font-weight:bold;
    margin-bottom:6px;
}

.tablero-detalle{
    margin-top:6px;
    font-size:14px;
    color:#333;
    line-height:1.6;
}

.activo{
    color:green;
    font-weight:bold;
}

.completo{
    color:red;
    font-weight:bold;
}

button{
    padding:10px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.btn-entrar{
    background:#003366;
    color:white;
    white-space:nowrap;
}

.btn-crear{
    width:100%;
    margin-top:20px;
    background:#1e8e3e;
    color:white;
    font-size:16px;
}

.estado-rapido{
    max-width:700px;
    margin:0 auto 20px;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    text-align:center;
}

.estado-rapido h3{
    margin-top:0;
    color:#003366;
}

.barra-externa{
    width:100%;
    height:14px;
    background:#d9e7f5;
    border-radius:999px;
    overflow:hidden;
    margin:10px 0 8px;
}

.barra-interna{
    height:100%;
    background:linear-gradient(90deg, #1e8e3e, #43b866);
    border-radius:999px;
    transition:width 0.3s ease;
}

.progreso-texto{
    font-size:13px;
    color:#003366;
    font-weight:bold;
}

.contador-tablero{
    font-size:13px;
    color:#444;
    margin-top:6px;
}

footer{
    background:transparent;
    color:#003366;
    text-align:center;
    padding:18px 12px 24px;
    font-size:13px;
    line-height:1.5;
}

@media (max-width: 768px){
    .acciones-iniciales{
        flex-direction:column;
        padding:0 14px;
    }

    .container{
        margin:0 14px 25px;
        padding:20px;
    }

    .estado-rapido{
        margin:0 14px 20px;
    }

    .tablero-card{
        align-items:flex-start;
    }

    .btn-entrar{
        width:100%;
    }
}
</style>
</head>

<body class="home lobby">

<header>
    <img src="/assets/images/logotipo.png" class="logo" alt="Quiz 1000">
</header>

<div class="acciones-iniciales">
    <button class="btn-principal btn-tablero-curso" onclick="irAListaTableros()">
        Participar en Tablero en curso
    </button>

    <button class="btn-principal btn-tablero-nuevo" onclick="crearNuevoTablero()">
        Abrir Nuevo Tablero
    </button>
</div>

<div class="estado-rapido" id="estadoRapido">
    <h3>📊 Estado Actual</h3>
    <p>Cargando tableros...</p>
</div>

<div class="container" id="seccionTableros" style="display:none;">
    <h2>Tableros Disponibles</h2>

    <div id="listaTableros">
        <p>Cargando tableros...</p>
    </div>

    <button class="btn-crear" onclick="crearNuevoTablero()">Abrir Nuevo Tablero</button>
</div>

<div style="text-align:center; margin:16px 0 10px;">
    <a href="/index">
        <img src="/assets/images/home-icon.png"
             alt="Home"
             style="width:60px; height:auto; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3));">
    </a>
</div>

<footer>
© 2026 Quiz1000 LLC.All rights reserved. QUIZ1000 is a trademark of Quiz1000 LLC.<br>
www.Quiz1000.llc
</footer>

<script>
// =============================
// PROTEGER LOBBY
// =============================
const usuario = JSON.parse(localStorage.getItem("usuarioLogueado"));
if(!usuario){
    window.location.href = "login.html";
}

const lista = document.getElementById("listaTableros");
const DIEZ_DIAS_MS = 10 * 24 * 60 * 60 * 1000;

// =============================
// IR A LISTA DE TABLEROS
// =============================
function irAListaTableros() {
    const seccion = document.getElementById("seccionTableros");

    if (seccion) {
        seccion.style.display = "block";
        cargarTableros();

        setTimeout(() => {
            seccion.scrollIntoView({
                behavior: "smooth",
                block: "start"
            });
        }, 100);
    }
}

// =============================
// FORMATEAR TIEMPO RESTANTE
// =============================
function formatearTiempoRestante(msRestantes) {
    if (msRestantes <= 0) {
        return "Vencido";
    }

    const totalSegundos = Math.floor(msRestantes / 1000);
    const dias = Math.floor(totalSegundos / 86400);
    const horas = Math.floor((totalSegundos % 86400) / 3600);
    const minutos = Math.floor((totalSegundos % 3600) / 60);

    return `${dias}d ${horas}h ${minutos}m`;
}

// =============================
// CARGAR SOLO ESTADO RAPIDO
// =============================
async function cargarEstadoRapido() {
    try {
        const res = await fetch("/api/tableros");
        const data = await res.json();

        if(!data.ok || !Array.isArray(data.tableros)){
            document.getElementById("estadoRapido").innerHTML = `
                <h3>📊 Estado Actual</h3>
                <p>No fue posible consultar tableros.</p>
            `;
            return;
        }

        const tablerosActivos = data.tableros.filter(t => Number(t.completo) === 0);

        document.getElementById("estadoRapido").innerHTML = `
            <h3>📊 Estado Actual</h3>
            <p>Hay <strong>${tablerosActivos.length}</strong> tablero(s) en curso</p>
        `;
    } catch (error) {
        console.error("ERROR CARGANDO ESTADO RAPIDO:", error);
        document.getElementById("estadoRapido").innerHTML = `
            <h3>📊 Estado Actual</h3>
            <p>Error consultando el estado actual.</p>
        `;
    }
}

// =============================
// CARGAR TABLEROS DESDE BACKEND
// =============================
async function cargarTableros() {
    try {
        const res = await fetch("/api/tableros");
        const data = await res.json();

        if(!data.ok || !Array.isArray(data.tableros)){
            lista.innerHTML = "<p>No se pudieron cargar los tableros.</p>";
            return;
        }

        const tablerosActivos = data.tableros.filter(t => Number(t.completo) === 0);

        if(tablerosActivos.length === 0){
            lista.innerHTML = "<p>No hay tableros en curso aún.</p>";
            return;
        }

        const resumenes = await Promise.all(
            tablerosActivos.map(async (tablero) => {
                const resumen = await obtenerResumenTablero(tablero.id);
                return {
                    ...tablero,
                    ...resumen
                };
            })
        );

        resumenes.sort((a, b) => {
            return a.msRestantesOrden - b.msRestantesOrden;
        });

        const tarjetasHtml = resumenes.map((tablero) => {
            return `
                <div class="tablero-card">
                    <div class="tablero-info">
                        <div class="tablero-folio">${tablero.id}</div>

                        <div class="tablero-detalle">
                            <span class="activo">En curso</span><br>
                            Casillas pagadas: <strong>${tablero.pagadas}</strong><br>
                            Casillas apartadas: <strong>${tablero.reservadas}</strong><br>
                            Faltan por pagar: <strong>${tablero.faltantes}</strong>
                        </div>

                        <div class="barra-externa">
                            <div class="barra-interna" style="width:${tablero.porcentajePagado}%"></div>
                        </div>

                        <div class="progreso-texto">
                            Progreso: ${tablero.pagadas}/50 (${tablero.porcentajePagado}%)
                        </div>

                        <div class="contador-tablero">
                            ${tablero.textoVencimiento}
                        </div>
                    </div>

                    <button class="btn-entrar" onclick="abrirTableroEnCurso('${tablero.id}')">
                        Entrar
                    </button>
                </div>
            `;
        });

        lista.innerHTML = tarjetasHtml.join("");

    } catch (error) {
        console.error("ERROR CARGANDO TABLEROS:", error);
        lista.innerHTML = "<p>Error cargando tableros.</p>";
    }
}

// =============================
// RESUMEN DE CADA TABLERO
// =============================
async function obtenerResumenTablero(folio) {
    try {
        const [resCasillas, resEstado] = await Promise.all([
            fetch("/api/estado-casillas?folio=" + encodeURIComponent(folio)),
            fetch("/api/estado-tablero?folio=" + encodeURIComponent(folio))
        ]);

        const dataCasillas = await resCasillas.json();
        const dataEstado = await resEstado.json();

        const casillas = (dataCasillas.ok && Array.isArray(dataCasillas.casillas))
            ? dataCasillas.casillas
            : [];

        const pagadas = casillas.filter(c => c.estado === "pagada").length;
        const reservadas = casillas.filter(c => c.estado === "reservada").length;
        const faltantes = 50 - pagadas;
        const porcentajePagado = Math.round((pagadas / 50) * 100);

        let msRestantes = Number.MAX_SAFE_INTEGER;
        let textoVencimiento = "Aún no inicia contador de 10 días";

        if (dataEstado.ok && dataEstado.tablero) {
            if (typeof dataEstado.tablero.msRestantes === "number") {
                msRestantes = dataEstado.tablero.msRestantes;
                textoVencimiento = msRestantes > 0
                    ? `Vence en: ${formatearTiempoRestante(msRestantes)}`
                    : "Vencido";
            } else if (dataEstado.tablero.fechaApertura) {
                const msCalculados = (Number(dataEstado.tablero.fechaApertura) + DIEZ_DIAS_MS) - Date.now();
                msRestantes = msCalculados;
                textoVencimiento = msCalculados > 0
                    ? `Vence en: ${formatearTiempoRestante(msCalculados)}`
                    : "Vencido";
            }
        }

        return {
            pagadas,
            reservadas,
            faltantes,
            porcentajePagado,
            msRestantesOrden: msRestantes,
            textoVencimiento
        };

    } catch (error) {
        console.error("ERROR LEYENDO ESTADO DE CASILLAS:", folio, error);
        return {
            pagadas: 0,
            reservadas: 0,
            faltantes: 50,
            porcentajePagado: 0,
            msRestantesOrden: Number.MAX_SAFE_INTEGER,
            textoVencimiento: "No se pudo consultar el vencimiento"
        };
    }
}

// =============================
// ABRIR TABLERO EN CURSO
// =============================
function abrirTableroEnCurso(folio) {
    localStorage.setItem("folioTableroActual", folio);

    const carritoKey = "carrito_" + folio;
    if (!localStorage.getItem(carritoKey)) {
        localStorage.setItem("carrito_" + folio, JSON.stringify({
            items: [],
            total: 0
        }));
    }

    window.location.href = "/tablero?folio=" + encodeURIComponent(folio);
}

// =============================
// CREAR NUEVO TABLERO
// =============================
async function crearNuevoTablero() {
    try {
        const res = await fetch("/api/crear-tablero", {
            method: "POST"
        });

        const data = await res.json();

        if (!data.ok || !data.folio) {
            alert("Error creando tablero");
            return;
        }

        const folio = data.folio;

        localStorage.setItem("folioTableroActual", folio);

        const carritoKey = "carrito_" + folio;
        if (!localStorage.getItem(carritoKey)) {
            localStorage.setItem(carritoKey, JSON.stringify({
                items: [],
                total: 0
            }));
        }

        let jugadorActual = JSON.parse(localStorage.getItem("jugadorActual"));
        let usuarioLogueado = JSON.parse(localStorage.getItem("usuarioLogueado"));

        if (jugadorActual) {
            if (!jugadorActual.tableros) {
                jugadorActual.tableros = {};
            }

            if (!jugadorActual.tableros[folio]) {
                jugadorActual.tableros[folio] = {
                    numeros: [],
                    tiempos: [],
                    estado: "activo"
                };
            }

            localStorage.setItem("jugadorActual", JSON.stringify(jugadorActual));
        }

        if (usuarioLogueado) {
            if (!usuarioLogueado.tableros) {
                usuarioLogueado.tableros = {};
            }

            if (!usuarioLogueado.tableros[folio]) {
                usuarioLogueado.tableros[folio] = {
                    numeros: [],
                    tiempos: [],
                    estado: "activo"
                };
            }

            localStorage.setItem("usuarioLogueado", JSON.stringify(usuarioLogueado));
        }

        window.location.href = "/tablero?folio=" + encodeURIComponent(folio);

    } catch (error) {
        console.error("Error creando tablero desde lobby:", error);
        alert("Error creando tablero");
    }
}

// =============================
// INICIO
// =============================
cargarEstadoRapido();

setInterval(() => {
    cargarEstadoRapido();

    const seccion = document.getElementById("seccionTableros");
    if (seccion && seccion.style.display !== "none") {
        cargarTableros();
    }
}, 60000);
(function(){
    const jugador = JSON.parse(localStorage.getItem("jugadorActual") || "null")
                 || JSON.parse(localStorage.getItem("usuarioLogueado") || "null");
    if(!jugador) return;

    const fecha = new Date().toLocaleDateString("es-MX", {
        weekday: "long", day: "numeric", month: "long", year: "numeric"
    });

    const bar = document.createElement("div");
    bar.id = "sessionBar";
    bar.style.cssText = `
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 9999;
        background: rgba(0,0,0,0.75);
        backdrop-filter: blur(6px);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 16px;
        font-size: 13px;
        color: #fff;
        font-family: sans-serif;
        border-bottom: 1px solid rgba(255,255,255,0.1);
    `;
    bar.innerHTML = `
        <span>👤 <strong>${jugador.nombre || "Jugador"}</strong></span>
        <span style="color:#aaa;">📅 ${fecha}</span>
        <a href="/perfil.html"
           style="background:#1a56db;color:#fff;padding:4px 12px;border-radius:6px;
                  text-decoration:none;font-weight:bold;font-size:12px;">
            Mi Perfil
        </a>
    `;
    document.body.prepend(bar);

    document.body.style.paddingTop = (document.body.style.paddingTop
        ? (parseInt(document.body.style.paddingTop) + 36) : 36) + "px";
})();
</script>

</body>
</html>

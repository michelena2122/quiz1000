<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lobby - Quiz 1000</title>

<link rel="stylesheet" href="css/styles.css?v=2">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#cfe9ff;
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

header{
    text-align:center;
    padding:30px 20px 10px;
}

.logo{
    width:120px;
}

.container{
    flex:1;
    max-width:700px;
    margin:0 auto 30px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#003366;
    margin-top:0;
}

.tablero-card{
    padding:15px;
    margin-bottom:14px;
    background:#f2f8ff;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;
}

.tablero-info{
    flex:1;
    min-width:220px;
}

.tablero-folio{
    font-size:18px;
    color:#003366;
    font-weight:bold;
}

.tablero-detalle{
    margin-top:6px;
    font-size:14px;
    color:#333;
    line-height:1.5;
}

.activo{
    color:green;
    font-weight:bold;
}

.completo{
    color:red;
    font-weight:bold;
}

button{
    padding:10px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.btn-entrar{
    background:#003366;
    color:white;
    white-space:nowrap;
}

.btn-crear{
    width:100%;
    margin-top:20px;
    background:#1e8e3e;
    color:white;
    font-size:16px;
}

.estado-rapido{
    max-width:700px;
    margin:0 auto 20px;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    text-align:center;
}

.estado-rapido h3{
    margin-top:0;
    color:#003366;
}

footer{
    background:#003366;
    color:white;
    text-align:center;
    padding:10px;
}

@media (max-width: 768px){
    .container{
        margin:0 14px 25px;
        padding:20px;
    }

    .estado-rapido{
        margin:0 14px 20px;
    }

    .tablero-card{
        align-items:flex-start;
    }

    .btn-entrar{
        width:100%;
    }
}
</style>
</head>

<body class="home lobby">

<header>
    <img src="/assets/images/logotipo.png" class="logo" alt="Quiz 1000">
</header>

<div class="estado-rapido" id="estadoRapido">
    <h3>📊 Estado Actual</h3>
    <p>Cargando tableros...</p>
</div>

<div class="container">
    <h2>Tableros Disponibles</h2>

    <div id="listaTableros">
        <p>Cargando tableros...</p>
    </div>

    <button class="btn-crear" onclick="crearNuevoTablero()">Nuevo tablero</button>
</div>

<footer>
© 2026 Quiz1000 LLC.
All rights reserved. QUIZ1000 is a trademark of Quiz1000 LLC.
www.Quiz1000.llc
</footer>

<script>
// =============================
// PROTEGER LOBBY
// =============================
const usuario = JSON.parse(localStorage.getItem("usuarioLogueado"));
if(!usuario){
    window.location.href = "login.html";
}

const lista = document.getElementById("listaTableros");

// =============================
// CARGAR TABLEROS DESDE BACKEND
// =============================
async function cargarTableros() {
    try {
        const res = await fetch("/api/tableros");
        const data = await res.json();

        if(!data.ok || !Array.isArray(data.tableros)){
            lista.innerHTML = "<p>No se pudieron cargar los tableros.</p>";
            document.getElementById("estadoRapido").innerHTML = `
                <h3>📊 Estado Actual</h3>
                <p>No fue posible consultar tableros.</p>
            `;
            return;
        }

        const tablerosActivos = data.tableros.filter(t => Number(t.completo) === 0);

        if(tablerosActivos.length === 0){
            lista.innerHTML = "<p>No hay tableros en curso aún.</p>";
            document.getElementById("estadoRapido").innerHTML = `
                <h3>📊 Estado Actual</h3>
                <p>No hay tableros activos por ahora.</p>
            `;
            return;
        }

        const tarjetasHtml = await Promise.all(
            tablerosActivos.map(async (tablero) => {
                const resumen = await obtenerResumenTablero(tablero.id);

                return `
                    <div class="tablero-card">
                        <div class="tablero-info">
                            <div class="tablero-folio">${tablero.id}</div>
                            <div class="tablero-detalle">
                                <span class="activo">En curso</span><br>
                                Casillas pagadas: <strong>${resumen.pagadas}</strong><br>
                                Casillas apartadas: <strong>${resumen.reservadas}</strong><br>
                                Faltan por pagar: <strong>${resumen.faltantes}</strong>
                            </div>
                        </div>

                        <button class="btn-entrar" onclick="abrirTableroEnCurso('${tablero.id}')">
                            Jugar tablero en curso
                        </button>
                    </div>
                `;
            })
        );

        lista.innerHTML = tarjetasHtml.join("");

        document.getElementById("estadoRapido").innerHTML = `
            <h3>📊 Estado Actual</h3>
            <p>Hay <strong>${tablerosActivos.length}</strong> tablero(s) en curso</p>
        `;

    } catch (error) {
        console.error("ERROR CARGANDO TABLEROS:", error);
        lista.innerHTML = "<p>Error cargando tableros.</p>";
        document.getElementById("estadoRapido").innerHTML = `
            <h3>📊 Estado Actual</h3>
            <p>Error consultando el estado actual.</p>
        `;
    }
}

// =============================
// RESUMEN DE CADA TABLERO
// =============================
async function obtenerResumenTablero(folio) {
    try {
        const res = await fetch("/api/estado-casillas?folio=" + encodeURIComponent(folio));
        const data = await res.json();

        if(!data.ok || !Array.isArray(data.casillas)){
            return {
                pagadas: 0,
                reservadas: 0,
                faltantes: 50
            };
        }

        const pagadas = data.casillas.filter(c => c.estado === "pagada").length;
        const reservadas = data.casillas.filter(c => c.estado === "reservada").length;
        const faltantes = 50 - pagadas;

        return {
            pagadas,
            reservadas,
            faltantes
        };

    } catch (error) {
        console.error("ERROR LEYENDO ESTADO DE CASILLAS:", folio, error);
        return {
            pagadas: 0,
            reservadas: 0,
            faltantes: 50
        };
    }
}

// =============================
// ABRIR TABLERO EN CURSO
// =============================
function abrirTableroEnCurso(folio) {
    localStorage.setItem("folioTableroActual", folio);

    const carritoKey = "carrito_" + folio;
    if (!localStorage.getItem(carritoKey)) {
        localStorage.setItem(carritoKey, JSON.stringify({
            items: [],
            total: 0
        }));
    }

    window.location.href = "/tablero?folio=" + encodeURIComponent(folio);
}

// =============================
// CREAR NUEVO TABLERO
// =============================
async function crearNuevoTablero() {
    try {
        const res = await fetch("/api/crear-tablero", {
            method: "POST"
        });

        const data = await res.json();

        if (!data.ok || !data.folio) {
            alert("Error creando tablero");
            return;
        }

        const folio = data.folio;

        localStorage.setItem("folioTableroActual", folio);

        const carritoKey = "carrito_" + folio;
        if (!localStorage.getItem(carritoKey)) {
            localStorage.setItem(carritoKey, JSON.stringify({
                items: [],
                total: 0
            }));
        }

        let jugadorActual = JSON.parse(localStorage.getItem("jugadorActual"));
        let usuarioLogueado = JSON.parse(localStorage.getItem("usuarioLogueado"));

        if (jugadorActual) {
            if (!jugadorActual.tableros) {
                jugadorActual.tableros = {};
            }

            if (!jugadorActual.tableros[folio]) {
                jugadorActual.tableros[folio] = {
                    numeros: [],
                    tiempos: [],
                    estado: "activo"
                };
            }

            localStorage.setItem("jugadorActual", JSON.stringify(jugadorActual));
        }

        if (usuarioLogueado) {
            if (!usuarioLogueado.tableros) {
                usuarioLogueado.tableros = {};
            }

            if (!usuarioLogueado.tableros[folio]) {
                usuarioLogueado.tableros[folio] = {
                    numeros: [],
                    tiempos: [],
                    estado: "activo"
                };
            }

            localStorage.setItem("usuarioLogueado", JSON.stringify(usuarioLogueado));
        }

        window.location.href = "/tablero?folio=" + encodeURIComponent(folio);

    } catch (error) {
        console.error("Error creando tablero desde lobby:", error);
        alert("Error creando tablero");
    }
}

// =============================
// INICIO
// =============================
cargarTableros();
</script>

</body>
</html>

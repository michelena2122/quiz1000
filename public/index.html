<div class="whatsapp-soporte">
    <button class="whatsapp-boton" id="abrir-chatbot" type="button">
        <img src="/assets/images/whatsapp.png" alt="WhatsApp">
    </button>

    <p class="texto-whatsapp">Atención a Jugadores</p>

    <div class="chatbot hidden" id="chatbot">
        <div class="chatbot-header">
            🤖 Ayuda a jugadores
        </div>

        <div class="chatbot-body">
            <p>Hola 👋 ¿En qué puedo ayudarte?</p>

            <button type="button" onclick="abrirWhatsAppSoporte('jugar')">¿Cómo jugar?</button>
            <button type="button" onclick="abrirWhatsAppSoporte('pagos')">¿Problemas con pagos?</button>
            <button type="button" onclick="abrirWhatsAppSoporte('folio')">¿Recuperar folio?</button>
            <button type="button" onclick="abrirWhatsAppSoporte('soporte')">Soporte técnico</button>

<script src="js/main.js"></script<script>
// ===============================
// 🎛 CONTROL CHATBOT (NO TOCAR)
// ===============================
const botonAbrirChatbot = document.getElementById("abrir-chatbot");
const botonCerrarChatbot = document.getElementById("cerrar-chatbot");
const chatbot = document.getElementById("chatbot");

if (botonAbrirChatbot && chatbot) {
    botonAbrirChatbot.addEventListener("click", function () {
        chatbot.classList.toggle("hidden");
    });
}

if (botonCerrarChatbot && chatbot) {
    botonCerrarChatbot.addEventListener("click", function () {
        chatbot.classList.add("hidden");
    });
}

// ===============================
// 🧠 CONTEXTO USUARIO
// ===============================
function obtenerContextoUsuario() {

    let folio = localStorage.getItem("folioTableroActual");

    let jugador = JSON.parse(localStorage.getItem("jugadorActual") || "null");
    let usuario = JSON.parse(localStorage.getItem("usuarioLogueado") || "null");

    let emailRegistro = localStorage.getItem("emailRegistro");

    return {
        folio: folio || "SIN_FOLIO",
        nombre: jugador?.nombre || usuario?.nombre || "Jugador",
        email: jugador?.email || usuario?.email || emailRegistro || "SIN_EMAIL"
    };
}

// ===============================
// 💬 WHATSAPP INTELIGENTE
// ===============================
function abrirWhatsAppSoporte(tipo) {

    const ctx = obtenerContextoUsuario();

    let mensaje = "Hola, necesito ayuda en QUIZ1000.%0A%0A";

    // 🔴 PRIORIDAD NEGOCIO: PAGOS
    if (tipo === "pagos") {
        mensaje += "🚨 PROBLEMA DE PAGO%0A";
        mensaje += "No puedo completar mi pago o tuve un error.%0A%0A";
    }

    if (tipo === "folio") {
        mensaje += "🔎 RECUPERAR FOLIO%0A";
        mensaje += "No encuentro mi folio.%0A%0A";
    }

    if (tipo === "jugar") {
        mensaje += "🎮 CÓMO JUGAR%0A";
        mensaje += "Necesito ayuda para entender el juego.%0A%0A";
    }

    if (tipo === "soporte") {
        mensaje += "🛠 SOPORTE TÉCNICO%0A";
        mensaje += "Tengo un problema técnico.%0A%0A";
    }

    // 📊 CONTEXTO AUTOMÁTICO
    mensaje += "📊 DATOS:%0A";
    mensaje += "Folio: " + ctx.folio + "%0A";
    mensaje += "Nombre: " + ctx.nombre + "%0A";
    mensaje += "Email: " + ctx.email;

    const telefono = "5215532004805"; // ✅ YA PUSE TU NÚMERO REAL

    const url = `https://wa.me/${telefono}?text=${mensaje}`;

    window.open(url, "_blank");
}
</script>

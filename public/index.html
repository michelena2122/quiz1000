<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Quiz $1000</title>
    <link rel="stylesheet" href="css/styles.css?v=2">
</head>

<body class="home">
    <header class="home-header" style="text-align:center; padding:20px 0;">
        <img src="./assets/images/logotipo.png"
             alt="Quiz $1000"
             style="max-width:320px; width:80%; height:auto;">
    </header>

    <div class="container">

        <h1 class="home-titulo" style="font-size: clamp(22px, 5vw, 42px); margin-top:10px;">
            Plataforma Oficial Quiz1000
        </h1>

        <!-- ===================== -->
        <!-- BLOQUE MI CUENTA -->
        <!-- ===================== -->
        <div class="home-bloque">
   <a href="registro.html?origen=home" class="perfil-link-home">
         <img src="./assets/images/registro.png" 
             alt="Registro"
             class="perfil-icono-home">
    </a>

            
        </div>

        <div class="home-bloque">
            <a href="perfil" class="perfil-link-home">
                <img src="./assets/images/perfil.png"
                     alt="Mi Perfil"
                     class="perfil-icono-home">
            </a>
        </div>

        <div class="home-bloque">
            <a href="lobby" class="tableros-link-home">
                <img src="./assets/images/tableros.png"
                     alt="Tableros Disponibles"
                     class="tableros-icono-home">
            </a>
        </div>

        <!-- ===================== -->
        <!-- BLOQUE INFORMACIÓN -->
        <!-- ===================== -->

        <div class="home-bloque">
            <a href="reglas" class="info-link-home">
                <img src="./assets/images/reglas.png"
                     alt="Reglas del Juego"
                     class="info-icono-home">
            </a>
        </div>

        <div class="home-bloque">
            <a href="legales" class="info-link-home">
                <img src="./assets/images/legales.png"
                     alt="Términos Legales"
                     class="info-icono-home">
            </a>
        </div>

    </div>

    <!-- ===================== -->
    <!-- BLOQUE TRANSPARENCIA -->
    <!-- ===================== -->

    <div class="home-bloque transparencia">
         <h2 class="testimonios-titulo">
            <img src="./assets/images/testimonios.png"
               alt="Testimonios"
              class="testimonios-icono-home"
             onclick="window.location.href='ranking.html'"
              style="cursor:pointer;">
        </h2>
    </div>

    <!-- BOTÓN WHATSAPP / CHATBOT -->
    <div class="whatsapp-soporte">
        <button class="whatsapp-boton" id="abrir-chatbot" type="button">
            <img src="/assets/images/whatsapp.png" alt="WhatsApp">
        </button>

        <p class="texto-whatsapp">Atención a Jugadores</p>

        <div class="chatbot hidden" id="chatbot">
            <div class="chatbot-header">
                🤖 Ayuda a jugadores
            </div>

            <div class="chatbot-body">
                <p>Hola 👋 ¿En qué puedo ayudarte?</p>

                <button type="button" onclick="mostrarAyuda('jugar')">¿Cómo jugar?</button>
                <button type="button" onclick="mostrarAyuda('pagos')">¿Problemas con pagos?</button>
                <button type="button" onclick="mostrarAyuda('folio')">¿Recuperar folio?</button>
                <button type="button" onclick="abrirWhatsAppSoporte('soporte')">Soporte técnico</button>

                <div id="respuesta-chatbot" style="margin-top:15px; font-size:14px; text-align:left;"></div>

                <button type="button" class="cerrar-chatbot" id="cerrar-chatbot">Cerrar</button>
            </div>
        </div>
    </div>

    <footer class="home-footer">
        © 2026 Quiz1000 LLC.All rights reserved. QUIZ1000 is a trademark of Quiz1000 LLC.www.Quiz1000.llc
    </footer>

    <script src="js/main.js"></script>

    <script>
    // ===============================
    // 🎛 CONTROL CHATBOT
    // ===============================
    const botonAbrirChatbot = document.getElementById("abrir-chatbot");
    const botonCerrarChatbot = document.getElementById("cerrar-chatbot");
    const chatbot = document.getElementById("chatbot");

    if (botonAbrirChatbot && chatbot) {
        botonAbrirChatbot.addEventListener("click", function () {
            chatbot.classList.toggle("hidden");
        });
    }

    if (botonCerrarChatbot && chatbot) {
        botonCerrarChatbot.addEventListener("click", function () {
            chatbot.classList.add("hidden");
        });
    }

    // ===============================
    // 🧠 CONTEXTO USUARIO
    // ===============================
    function obtenerContextoUsuario() {
        const folio = localStorage.getItem("folioTableroActual");
        const emailRegistro = localStorage.getItem("emailRegistro");

        let jugador = null;
        let usuario = null;

        try {
            jugador = JSON.parse(localStorage.getItem("jugadorActual") || "null");
        } catch (e) {
            jugador = null;
        }

        try {
            usuario = JSON.parse(localStorage.getItem("usuarioLogueado") || "null");
        } catch (e) {
            usuario = null;
        }

        return {
            folio: folio || "SIN_FOLIO",
            nombre: (jugador && jugador.nombre) || (usuario && usuario.nombre) || "Jugador",
            email: (jugador && jugador.email) || (usuario && usuario.email) || emailRegistro || "SIN_EMAIL"
        };
    }

    // ===============================
    // 📲 SOLO SOPORTE → WHATSAPP
    // ===============================
    function abrirWhatsAppSoporte() {
        const ctx = obtenerContextoUsuario();

        let mensaje = "Hola, necesito soporte en QUIZ1000.\n\n";
        mensaje += "🛠 SOPORTE TÉCNICO\n";
        mensaje += "Tengo un problema.\n\n";
        mensaje += "📊 DATOS:\n";
        mensaje += "Folio: " + ctx.folio + "\n";
        mensaje += "Nombre: " + ctx.nombre + "\n";
        mensaje += "Email: " + ctx.email;

        const telefono = "5215532004805";
        const url = "https://wa.me/" + telefono + "?text=" + encodeURIComponent(mensaje);

        window.open(url, "_blank");
    }

    // ===============================
    // 🤖 RESPUESTAS AUTOMÁTICAS
    // ===============================
    function mostrarAyuda(tipo) {
        const contenedor = document.getElementById("respuesta-chatbot");
        if (!contenedor) return;

        let html = "";

        if (tipo === "jugar") {
            html = `
                <b>¿Cómo jugar?</b><br><br>
                1. Selecciona una de las 50 casillas de tu tablero.<br>
                2. Puedes jugar varias casillas; eso te da más oportunidades de ganar.<br>
                3. Responde correctamente la pregunta en el menor tiempo posible, porque el mejor tiempo gana los 1,000 USD.<br>
                4. Las casillas que selecciones quedarán reservadas por 5 minutos; después se liberan si no se pagan.<br>
                5. Adquiere tu casilla; puede costar desde 1 dólar hasta 50 dólares.<br>
                6. Tus casillas se cobran en pesos al tipo de cambio vigente y el premio se paga en pesos al tipo de cambio aplicable.<br>
                7. El premio de 1,000 dólares se paga siempre que se completen las 50 casillas del tablero.<br>
                8. Si el tablero no se completa en 10 días, el sistema reembolsa automáticamente a los jugadores que pagaron.<br>
                9. Cuando se completa un tablero, los jugadores reciben un correo con números jugados, tiempos y evidencia del mejor tiempo del ganador.<br>
                10. Si eres el ganador, tu premio se deposita automáticamente en la misma tarjeta con la que pagaste.<br>
                11. QUIZ1000 busca que en cada tablero exista un ganador que reciba 1,000 dólares rápido, fácil y con poca inversión.
                12. SI EL TABLERO SE COMPLETA NO APLICAN REEMBOLSOS, SI EL TABLERO NO SE COMPLETA EN 10 DÍAS, SE REEMBOLSA A LOS JUGADORES<br>
                `;
        }

        if (tipo === "pagos") {
            html = `
                <b>Problemas con pagos</b><br><br>
                • <b>No pude pagar:</b> intenta nuevamente y verifica tus datos bancarios.<br><br>
                • <b>Ya pagué y no se ve reflejado:</b> espera unos segundos, actualiza la página y revisa tu perfil.<br><br>
                • <b>¿Qué pasa si pago y no se completa mi tablero?</b><br>
                Si el tablero no se completa dentro de 10 días, el sistema reembolsa automáticamente a los jugadores que pagaron.
            `;
        }

        if (tipo === "folio") {
            const folioActual = localStorage.getItem("folioTableroActual");

            html = `
                <b>Recuperar folio</b><br><br>
                ${folioActual ? "Tu folio actual es: <b>" + folioActual + "</b>" : "No tienes un folio activo en este momento."}
            `;
        }

        contenedor.innerHTML = html;
    }
    (function(){
    const jugador = JSON.parse(localStorage.getItem("jugadorActual") || "null")
                 || JSON.parse(localStorage.getItem("usuarioLogueado") || "null");
    if(!jugador) return;

    const fecha = new Date().toLocaleDateString("es-MX", {
        weekday: "long", day: "numeric", month: "long", year: "numeric"
    });

    const bar = document.createElement("div");
    bar.id = "sessionBar";
    bar.style.cssText = `
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 9999;
        background: rgba(0,0,0,0.75);
        backdrop-filter: blur(6px);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 16px;
        font-size: 13px;
        color: #fff;
        font-family: sans-serif;
        border-bottom: 1px solid rgba(255,255,255,0.1);
    `;
    bar.innerHTML = `
        <span>👤 <strong>${jugador.nombre || "Jugador"}</strong></span>
        <span style="color:#aaa;">📅 ${fecha}</span>
        <a href="/perfil.html"
           style="background:#1a56db;color:#fff;padding:4px 12px;border-radius:6px;
                  text-decoration:none;font-weight:bold;font-size:12px;">
            Mi Perfil
        </a>
    `;
    document.body.prepend(bar);

    // Empujar el contenido para que no quede tapado por la barra
    document.body.style.paddingTop = (document.body.style.paddingTop
        ? (parseInt(document.body.style.paddingTop) + 36) : 36) + "px";
})();

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recuperar contraseña</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:url("assets/images/fondo-rayos.jpg") no-repeat center center fixed;
background-size:cover;
margin:0;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding:20px 16px 140px;
position:relative;
}

/* =========================
LOGO HEADER
========================= */
.logo-header{
width:100%;
display:flex;
justify-content:center;
margin-top:10px;
margin-bottom:20px;
z-index:2;
}

.logo-header img{
width:min(220px, 68vw);
height:auto;
display:block;
}

/* =========================
BOX
========================= */
.box{
background:rgba(0,0,0,0.85);
color:white;
padding:28px 20px;
border-radius:16px;
text-align:center;
width:100%;
max-width:350px;
z-index:2;
box-shadow:0 8px 24px rgba(0,0,0,0.35);
}

.box h2{
margin-top:0;
margin-bottom:12px;
font-size:28px;
line-height:1.2;
}

.box p{
margin-bottom:18px;
font-size:15px;
line-height:1.4;
}

input{
width:100%;
padding:14px 12px;
margin-top:8px;
margin-bottom:18px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
width:100%;
padding:14px 20px;
background:#27ae60;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
font-size:16px;
font-weight:bold;
}

#msg{
margin-top:16px;
font-size:14px;
line-height:1.4;
}

/* =========================
FOOTER
========================= */
.footer-login{
width:100%;
text-align:center;
color:white;
font-size:12px;
line-height:1.5;
opacity:0.9;
margin-top:auto;
padding-top:24px;
z-index:2;
}

/* =========================
ROBOT FLOTANTE
========================= */
.robot-flotante{
position:fixed;
left:50%;
transform:translateX(-50%);
bottom:160px;
z-index:1;
pointer-events:none;
}

.robot-flotante img{
width:110px;
}

@keyframes flotar{
0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}
}

/* =========================
TABLET / DESKTOP
========================= */
@media (min-width: 768px){

body{
justify-content:center;
padding:40px 20px 140px;
}

.logo-header{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
margin:0;
}

.logo-header img{
width:200px;
}

.box{
padding:40px;
max-width:380px;
}

.robot-flotante{
left:50%;
transform:translateX(-50%);
bottom:40px;
}

.robot-flotante img{
width:110px;
}

.footer-login{
position:absolute;
bottom:20px;
left:0;
margin-top:0;
padding-top:0;
font-size:12px;
}

}

/* =========================
MOVIL PEQUEÑO
========================= */
@media (max-width: 480px){

body{
padding:16px 14px 130px;
}

.logo-header{
margin-top:4px;
margin-bottom:16px;
}

.logo-header img{
width:min(190px, 64vw);
}

.box{
padding:22px 16px;
border-radius:14px;
max-width:100%;
}

.box h2{
font-size:24px;
}

.box p{
font-size:14px;
margin-bottom:16px;
}

input{
padding:13px 11px;
font-size:16px;
}

button{
padding:13px 16px;
font-size:16px;
}

.footer-login{
font-size:11px;
line-height:1.4;
}

.robot-flotante{
left:50%;
transform:translateX(-50%);
bottom:175px;
}

.robot-flotante img{
width:95px;
}

}

</style>
</head>

<body>

<!-- LOGO -->
<div class="logo-header">
<img src="assets/images/logotipo.png" alt="QUIZ1000">
</div>

<!-- CAJA -->
<div class="box">

<h2>Recuperar contraseña</h2>

<p>Ingresa tu correo registrado</p>

<input type="email" id="email" placeholder="Correo electrónico">

<button onclick="enviar()">Enviar código</button>

<p id="msg"></p>

</div>

<!-- ROBOT -->
<div class="robot-flotante">
<img src="assets/images/robot.png" alt="Robot">
</div>

<!-- FOOTER -->
<footer class="footer-login">
<p>© 2026 Quiz1000 LLC.<br>
All rights reserved. QUIZ1000 is a trademark of Quiz1000 LLC.<br>
www.Quiz1000.llc</p>
</footer>

<script>

async function enviar(){

const email = document.getElementById("email").value;

localStorage.setItem("recuperarEmail", email);

const res = await fetch("/enviar-codigo",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({ email })

});

const data = await res.json();

if(data.ok){

window.location.href = "recuperar-validar.html";

}else{

document.getElementById("msg").innerText =
"No se pudo enviar el código";

}

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login QUIZ1000</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Arial, sans-serif;
      min-height:100vh;
      padding:0;
      color:white;
      position:relative;
      overflow-x:hidden;
      background:#071b3a;
    }

    .fondo-rayos{
  position:fixed;
  inset:0;
  z-index:0;
  background: url("/assets/images/fondo-rayos.jpg") center/cover no-repeat;
}

    .pagina-login{
      position:relative;
      z-index:2;
      width:100%;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      padding:20px 14px 24px;
    }

    .login-logo{
      margin-bottom:18px;
      text-align:center;
    }

    .login-logo img{
      width:130px;
      max-width:50vw;
      height:auto;
      display:block;
      margin:0 auto;
    }

    .login-card{
      width:100%;
      max-width:360px;
      background:rgba(255,255,255,0.10);
      border:1px solid rgba(255,255,255,0.14);
      border-radius:18px;
      padding:22px 16px;
      box-shadow:0 10px 30px rgba(0,0,0,0.35);
      backdrop-filter:blur(8px);
    }

    h2{
      text-align:center;
      font-size:26px;
      margin-bottom:20px;
      color:#22c55e;
    }

    .campo{
      margin-bottom:14px;
    }

    input{
      width:100%;
      padding:14px 16px;
      border:none;
      border-radius:12px;
      font-size:16px;
      outline:none;
      background:white;
      color:#111827;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      font-size:16px;
      font-weight:bold;
      background:#22c55e;
      color:white;
      cursor:pointer;
      transition:0.2s ease;
      margin-top:4px;
    }

    button:hover{
      opacity:0.95;
      transform:translateY(-1px);
    }

    #msg{
      min-height:22px;
      margin-top:14px;
      text-align:center;
      font-size:14px;
      color:#facc15;
    }

    .link-recuperar{
      margin-top:12px;
      text-align:center;
    }

    .link-recuperar a{
      color:#93c5fd;
      text-decoration:none;
      font-size:15px;
    }

    .link-recuperar a:hover{
      text-decoration:underline;
    }

    .footer-login{
      margin-top:18px;
      text-align:center;
      color:#dbeafe;
      font-size:12px;
      line-height:1.5;
      padding:0 10px 6px;
      max-width:360px;
    }

    @media (max-width:480px){
      .login-logo img{
        width:110px;
        max-width:46vw;
      }

      .login-card{
        padding:20px 14px;
        border-radius:16px;
      }

      h2{
        font-size:24px;
      }

      input{
        padding:13px 14px;
        font-size:16px;
      }

      button{
        padding:13px;
        font-size:16px;
      }

      .footer-login{
        font-size:11px;
      }
    }
  </style>
</head>

<body>

  <div class="fondo-rayos"></div>

  <div class="pagina-login">

    <div class="login-logo">
      <img src="assets/images/portada.png" alt="QUIZ1000">
    </div>

    <div class="login-card">
      <h2>Iniciar sesión</h2>

      <div class="campo">
        <input type="email" id="email" placeholder="Correo electrónico">
      </div>

      <div class="campo">
        <input type="password" id="password" placeholder="Contraseña">
      </div>

      <button onclick="login()">Entrar</button>

      <p id="msg"></p>

      <p class="link-recuperar">
        <a href="recuperar.html">¿Olvidaste tu contraseña?</a>
      </p>
    </div>

    <footer class="footer-login">
      <p>© 2026 Quiz1000 LLC.<br>
      All rights reserved. QUIZ1000 is a trademark of Quiz1000 LLC.<br>
      www.Quiz1000.llc</p>
    </footer>

  </div>

  <script>
    function login(){

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      fetch("/login",{
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body: JSON.stringify({
          email,
          password
        })
      })
      .then(res => res.json())
      .then(data => {

        if(data.ok){

          localStorage.setItem("usuarioLogueado", JSON.stringify(data.usuario));
          window.location.href = "perfil.html";

        }else{

          document.getElementById("msg").innerText = data.mensaje;

        }

      })
      .catch(() => {
        document.getElementById("msg").innerText = "Error de conexión";
      });

    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Validar Correo</title>

<style>

body{
font-family:Arial;
background:url("assets/images/fondo-rayos.jpg") no-repeat center center fixed;
background-size:cover;
color:white;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

height:100vh;
margin:0;
}

.logo-verificacion{
width:420px;
height:auto;
display:block;
margin-bottom:30px;
}

.box{
background:rgba(0,0,0,0.85);
padding:40px;
border-radius:12px;
text-align:center;
}

#error{
margin-top:16px;
font-weight:bold;
min-height:24px;
}

</style>

</head>

<body>

<img src="/assets/images/logotipo.png" class="logo-verificacion">

<div class="box">

<h2>Verifica tu correo</h2>

<p>Ingresa el código que enviamos a tu email</p>
<p id="contador"></p>

<div style="display:flex;gap:8px;justify-content:center;width:auto;">

<input class="codigo" type="tel" maxlength="1"
style="width:60px;height:60px;font-size:28px;text-align:center;border-radius:8px;border:2px solid #ccc;">

<input class="codigo" type="tel" maxlength="1"
style="width:60px;height:60px;font-size:28px;text-align:center;border-radius:8px;border:2px solid #ccc;">

<input class="codigo" type="tel" maxlength="1"
style="width:60px;height:60px;font-size:28px;text-align:center;border-radius:8px;border:2px solid #ccc;">

<input class="codigo" type="tel" maxlength="1"
style="width:60px;height:60px;font-size:28px;text-align:center;border-radius:8px;border:2px solid #ccc;">

<input class="codigo" type="tel" maxlength="1"
style="width:60px;height:60px;font-size:28px;text-align:center;border-radius:8px;border:2px solid #ccc;">

<input class="codigo" type="tel" maxlength="1"
style="width:60px;height:60px;font-size:28px;text-align:center;border-radius:8px;border:2px solid #ccc;">

</div>

<br>

<button onclick="verificar()" style="background:#27ae60;color:white;border:none;padding:12px 30px;border-radius:8px;font-size:16px;cursor:pointer;">
Verificar
</button>

<br><br>

<button onclick="reenviar()" style="background:#2ecc71;color:white;border:none;padding:10px 25px;border-radius:8px;font-size:15px;cursor:pointer;">
Reenviar código
</button>

<p id="error"></p>

</div>

<script>
// ============================
// EVITAR VALIDACIÓN DUPLICADA
// ============================

const jugadorActual = JSON.parse(localStorage.getItem("jugadorActual"));

if(jugadorActual && jugadorActual.id){

    console.log("USUARIO YA VALIDADO, REDIRECCIÓN DIRECTA");

    const folio =
        localStorage.getItem("folioTableroActual") ||
        localStorage.getItem("folioTablero") ||
        "";

    const origenRegistro = localStorage.getItem("origenRegistro");

    if(origenRegistro === "home"){
        localStorage.removeItem("origenRegistro");
        window.location.href = "portada.html";
    }else{
        window.location.href = "pago.html?folio=" + encodeURIComponent(folio);
    }
}
// ============================
// INPUTS CODIGO
// ============================

const inputs = document.querySelectorAll(".codigo");

inputs.forEach((input, index) => {

input.addEventListener("input", () => {

if(input.value.length === 1 && index < inputs.length - 1){
inputs[index + 1].focus();
}

});

input.addEventListener("keydown", (e) => {

if(e.key === "Backspace" && input.value === "" && index > 0){
inputs[index - 1].focus();
}

});

});

// ============================
// OBTENER CODIGO
// ============================

function obtenerCodigo(){

let codigo = "";

inputs.forEach(input=>{
codigo += input.value;
});

return codigo;

}

// ============================
// VERIFICAR CODIGO
// ============================

async function verificar(){

const error = document.getElementById("error");
error.innerText = "";
error.style.color = "white";

const codigoUsuario = obtenerCodigo();
const email = localStorage.getItem("emailRegistro");

if(!codigoUsuario || codigoUsuario.length < 6){
error.innerText = "Ingresa el código completo.";
error.style.color = "#f1c40f";
return;
}

try{

const res = await fetch("/validar-codigo",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email:email,
codigo:codigoUsuario
})

});

const data = await res.json();

if(data.ok){

error.innerText = "Correo verificado correctamente.";
error.style.color = "#2ecc71";

// obtener datos del registro
const registroPendiente = JSON.parse(localStorage.getItem("registroPendiente"));
console.log("REGISTRO PENDIENTE:", registroPendiente);

const resRegistro = await fetch("/registro",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify(registroPendiente)

});

const dataRegistro = await resRegistro.json();

console.log("RESPUESTA /registro:", dataRegistro);
console.log("ID DEVUELTO:", dataRegistro.id);

if(dataRegistro.ok && dataRegistro.id){

const usuarioRegistrado = {
id: dataRegistro.id,
nombre:
    (dataRegistro.usuario && dataRegistro.usuario.nombre) ||
    registroPendiente.nombre,
apellidos:
    (dataRegistro.usuario && dataRegistro.usuario.apellidos) ||
    registroPendiente.apellidos,
email:
    (dataRegistro.usuario && dataRegistro.usuario.email) ||
    registroPendiente.email,
telefono:
    (dataRegistro.usuario && dataRegistro.usuario.telefono) ||
    registroPendiente.telefono
};

localStorage.setItem("jugadorId", dataRegistro.id);
localStorage.setItem("usuarioLogueado", JSON.stringify(usuarioRegistrado));
localStorage.setItem("jugadorActual", JSON.stringify(usuarioRegistrado));
localStorage.removeItem("registroPendiente");

const folio =
localStorage.getItem("folioTableroActual") ||
localStorage.getItem("folioTablero") ||
"";

const origenRegistro = localStorage.getItem("origenRegistro");

if(origenRegistro === "home"){
localStorage.removeItem("origenRegistro");
window.location.href = "portada.html";
}else{
window.location.href = "pago.html?folio=" + encodeURIComponent(folio);
}

}else{

error.innerText = "No se pudo completar el registro";
error.style.color = "#e74c3c";

}

}else{

error.innerText = "El código capturado es erróneo.";
error.style.color = "#e74c3c";

}

}catch(err){

console.error("ERROR VALIDANDO CODIGO:", err);
error.innerText = "No se pudo verificar el código.";
error.style.color = "#e74c3c";

}

}

// ============================
// REENVIAR CODIGO
// ============================

async function reenviar(){

const error = document.getElementById("error");
error.innerText = "";
error.style.color = "white";

const email = localStorage.getItem("emailRegistro");

try{

const res = await fetch("/enviar-codigo",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email:email
})

});

const data = await res.json();

if(data.ok){

error.innerText = "Se reenvió código al mail registrado.";
error.style.color = "#2ecc71";

tiempo = 300;

}else{

error.innerText = data.mensaje || "Error enviando código";
error.style.color = "#e74c3c";

}

}catch(err){

console.error("ERROR REENVIANDO CODIGO:", err);
error.innerText = "No se pudo reenviar el código.";
error.style.color = "#e74c3c";

}

}

// ============================
// CONTADOR
// ============================

let tiempo = 300;

const contador = document.getElementById("contador");

const timer = setInterval(()=>{

let minutos = Math.floor(tiempo/60);
let segundos = tiempo % 60;

contador.innerText =
"⏳ Este código expira en " +
String(minutos).padStart(2,"0") +
":" +
String(segundos).padStart(2,"0");

tiempo--;

if(tiempo < 0){

clearInterval(timer);

contador.innerText = "El código expiró. Solicita uno nuevo.";

}

},1000);

</script>

</body>
</html>
